<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>VantageWorks Smart Site プレビュー</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
  :root {
    --canvas: #FAFBFD;
    --surface: #FFFFFF;
    --panel: #F4F7FB;
    --line: rgba(15, 23, 42, 0.10);
    --rule: rgba(15, 23, 42, 0.16);
    --ink: #0F172A;
    --ink-2: #475569;
    --ink-3: #94A3B8;
    --brand-50: #EFF6FF;
    --brand-100: #DBEAFE;
    --brand-200: #BFDBFE;
    --brand-600: #2563EB;
    --brand-700: #1D4ED8;
    --brand-900: #1E3A8A;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--canvas);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic UI", "Noto Sans JP", sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: "palt" 1;
  }
  button { font-family: inherit; }
  input, textarea { font-family: inherit; }

  .page-head { text-align: center; padding: 28px 20px 8px; }
  .page-head .badge {
    display: inline-block; padding: 5px 12px; border-radius: 999px;
    background: var(--brand-50); border: 1px solid var(--brand-200);
    color: var(--brand-700); font-size: 11px; font-weight: 600;
    letter-spacing: 0.16em; text-transform: uppercase;
  }
  .page-head h1 {
    margin: 14px 0 6px; font-size: 26px; font-weight: 600;
    letter-spacing: -0.015em; color: var(--ink);
  }
  .page-head p {
    margin: 0 auto 14px; max-width: 580px; font-size: 13px;
    line-height: 1.85; color: var(--ink-2);
  }

  .controls {
    display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
    margin: 10px auto 0; max-width: 760px; padding: 0 16px;
  }
  .controls button {
    font-size: 12px; padding: 7px 14px; border-radius: 999px;
    border: 1px solid var(--line); background: #fff;
    color: var(--ink); font-weight: 500; cursor: pointer;
  }
  .controls button:hover { border-color: var(--ink); }
  .controls button.active { background: var(--ink); color: #fff; border-color: var(--ink); }

  .stage { padding: 0; width: 100%; min-height: 100vh; }
  .phone {
    width: 100%; max-width: none;
    background: var(--canvas);
    border: none;
    border-radius: 0; padding: 0; position: relative;
    box-shadow: none;
    overflow: hidden;
    min-height: 100vh;
    display: flex; flex-direction: column;
  }
  .phone::before { display: none; }
  .screen {
    flex: 1;
    background: var(--canvas); border-radius: 0; overflow: visible;
    color: var(--ink); display: grid; grid-template-columns: 1fr 360px;
    min-height: 0; position: relative;
  }
  .main { display: flex; flex-direction: column; min-width: 0; }
  .aside-pc {
    background: var(--surface);
    border-left: 1px solid var(--line);
    padding: 22px 20px;
    display: flex; flex-direction: column; gap: 14px;
    position: relative;
  }
  .aside-pc .ah { display: flex; align-items: center; gap: 12px; }
  .aside-pc .ah .av {
    width: 56px; height: 56px; border-radius: 50%;
    overflow: hidden; background: var(--brand-50);
    border: 1px solid var(--brand-200); flex-shrink: 0;
  }
  .aside-pc .ah .av svg { width: 100%; height: 100%; }
  .aside-pc .ah .role { font-size: 10px; letter-spacing: 0.22em; color: var(--brand-600); font-weight: 700; }
  .aside-pc .ah .nm { font-size: 16px; font-weight: 600; margin-top: 4px; }
  .aside-pc .bubble {
    background: var(--brand-50); border: 1px solid var(--brand-200);
    border-radius: 14px; padding: 12px 14px;
    font-size: 12.5px; line-height: 1.85; color: var(--ink);
    min-height: 36px;
  }
  .aside-pc .sg-l {
    font-size: 10px; letter-spacing: 0.22em; color: var(--ink-3);
    font-weight: 700; margin-top: 4px;
  }
  .aside-pc .sg { display: flex; flex-direction: column; gap: 6px; }
  .aside-pc .sg button {
    display: flex; align-items: center; justify-content: space-between;
    padding: 11px 13px;
    background: #fff; border: 1px solid var(--line);
    border-radius: 12px; font-size: 12.5px; font-weight: 500;
    color: var(--ink); cursor: pointer; text-align: left;
    transition: border-color .15s, transform .12s;
    position: relative; overflow: hidden;
  }
  .aside-pc .sg button:hover { border-color: var(--ink); }
  .aside-pc .sg button:active { transform: scale(0.985); }
  .aside-pc .sg button.primary { background: var(--brand-600); color: #fff; border-color: var(--brand-600); }
  .aside-pc .sg button.primary:hover { background: var(--brand-700); }
  .aside-pc .foot { margin-top: auto; font-size: 10px; letter-spacing: 0.22em; color: var(--ink-3); font-weight: 700; }
  .ainav-fab { display: none; }

  .site-header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
  }
  .site-brand { display: flex; align-items: center; gap: 12px; }
  .logo-mark { width: 40px; height: 40px; flex-shrink: 0; }
  .logo-mark svg { width: 100%; height: 100%; }
  .logo-text { line-height: 1.25; }
  .brand-line {
    display: flex; align-items: baseline; gap: 8px;
    font-size: 16px; font-weight: 700;
    letter-spacing: -0.005em;
    color: var(--navy);
  }
  .brand-line .brand-divider { color: var(--ink-3); font-weight: 400; }
  .brand-line .brand-legal {
    font-size: 12px; font-weight: 500; color: var(--ink-2);
  }
  .brand-tagline {
    font-size: 11.5px; color: var(--ink-2); margin-top: 2px;
    letter-spacing: 0.04em;
  }
  .site-tags { display: flex; gap: 6px; }
  .site-tag {
    font-size: 11px; padding: 5px 11px; border-radius: 999px;
    background: var(--panel); color: var(--ink-2);
    font-weight: 600; border: 1px solid var(--line);
    cursor: pointer; transition: all .15s;
  }
  .site-tag:hover { background: var(--brand-50); color: var(--brand-700); border-color: var(--brand-200); }
  .site-tag.active { background: var(--brand-600); color: #fff; border-color: var(--brand-600); }

  .site-footer {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; padding: 16px 24px;
    background: var(--surface);
    border-top: 1px solid var(--line);
  }
  .sf-brand { font-size: 13px; font-weight: 600; color: var(--ink); }
  .sf-meta { font-size: 11px; color: var(--ink-2); margin-top: 3px; }
  .sf-right { display: flex; gap: 18px; flex-wrap: wrap; }
  .sf-link {
    font-size: 11.5px; color: var(--ink-2); cursor: pointer;
    transition: color .15s;
  }
  .sf-link:hover { color: var(--ink); }

  .topbar {
    background: transparent;
    border-bottom: 1px solid var(--line);
    padding: 10px 18px 12px;
  }
  .topbar .crumb .root { display: none; }
  .topbar.is-home { display: none; }

  @media (max-width: 760px) {
    .phone { max-width: 460px; border-radius: 28px; }
    .screen { grid-template-columns: 1fr; min-height: 640px; }
    .aside-pc { display: none; }
    .ainav-fab { display: flex; }
    .body { padding-bottom: 110px !important; }
  }

  .topbar {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px 12px; border-bottom: 1px solid var(--line); background: var(--canvas);
  }
  .topbar .back {
    width: 34px; height: 34px; border-radius: 11px;
    border: 1px solid var(--line); background: #fff;
    display: grid; place-items: center; color: var(--ink);
    cursor: pointer; flex-shrink: 0; transition: border-color .15s;
  }
  .topbar .back:disabled { color: #CBD5E1; cursor: default; }
  .topbar .back:hover:not(:disabled) { border-color: var(--ink); }
  .topbar .crumb {
    font-size: 11.5px; color: var(--ink-2);
    display: flex; align-items: center; gap: 6px;
    min-width: 0; flex: 1; overflow-x: auto; white-space: nowrap;
  }
  .topbar .crumb::-webkit-scrollbar { display: none; }
  .topbar .crumb .root { font-size: 9.5px; letter-spacing: 0.22em; color: var(--ink-3); font-weight: 700; }
  .topbar .crumb .sep { color: var(--ink-3); }
  .topbar .crumb .now { color: var(--ink); font-weight: 600; }
  .topbar .nav-btn {
    width: 34px; height: 34px; border-radius: 11px;
    border: 1px solid var(--line); background: #fff;
    display: grid; place-items: center; color: var(--brand-600);
    cursor: pointer; flex-shrink: 0; transition: border-color .15s;
  }
  .topbar .nav-btn:hover { border-color: var(--brand-600); }

  .body { flex: 1; padding: 0; min-width: 0; }
  .body > * { padding: 28px 26px 36px; }
  .body > .home-root { padding: 0; }
  .body > .home-root > .home-hero { padding-top: 56px; padding-bottom: 44px; }
  .body > .home-root > .home-choices,
  .body > .home-root > .employee-row,
  .body > .home-root > .home-section-head,
  .body > .home-root > .stats-home { padding-left: 26px; padding-right: 26px; }

  .home-root { padding: 0 0 8px; }
  .home-hero {
    position: relative; overflow: hidden;
    padding: 56px 32px 44px;
    background: linear-gradient(180deg, #F4F7FB 0%, #FAFBFD 100%);
    border-bottom: 1px solid var(--line);
  }
  .hero-aurora {
    position: absolute; inset: 0; pointer-events: none; overflow: hidden;
  }
  .hero-aurora::before, .hero-aurora::after {
    content: ""; position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.55;
  }
  .hero-aurora::before {
    top: -100px; right: -40px; width: 360px; height: 360px;
    background: radial-gradient(circle, rgba(34,211,238,0.45), transparent 70%);
  }
  .hero-aurora::after {
    bottom: -120px; left: -60px; width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(37,99,235,0.30), transparent 70%);
  }
  .hero-inner { position: relative; max-width: 640px; }
  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 11.5px; letter-spacing: 0.16em;
    color: var(--brand-700); font-weight: 700;
    padding: 6px 14px; border-radius: 999px;
    background: rgba(255,255,255,0.7); border: 1px solid var(--brand-200);
    backdrop-filter: blur(8px);
  }
  .dot-live {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--success); position: relative;
  }
  .dot-live::after {
    content: ""; position: absolute; inset: -3px;
    border-radius: 50%; background: var(--success); opacity: 0.4;
    animation: livePulse 2s ease-in-out infinite;
  }
  @keyframes livePulse {
    0%, 100% { transform: scale(1); opacity: 0.4; }
    50% { transform: scale(1.6); opacity: 0; }
  }
  .hero-title {
    font-size: 38px; line-height: 1.2; font-weight: 700;
    letter-spacing: -0.025em; color: var(--navy);
    margin: 18px 0 14px;
  }
  .hero-sub {
    font-size: 14.5px; line-height: 1.95; color: var(--ink-2);
    margin: 0 0 22px; max-width: 540px;
  }
  .hero-ask {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 12px 18px; background: #fff;
    border: 1px solid var(--line); border-radius: 14px;
    box-shadow: 0 8px 24px -16px rgba(15,23,42,0.20);
  }
  .hero-ask .ask-q {
    font-size: 14px; font-weight: 600; color: var(--ink);
  }

  .home-choices {
    padding: 24px 24px 6px;
    display: grid; gap: 8px;
  }
  .home-choices .choice {
    padding: 18px 18px;
    border-radius: 16px;
    margin-bottom: 0;
  }

  .home-root .employee-row {
    margin: 14px 24px 0;
  }

  .home-section-head {
    padding: 32px 24px 12px;
  }
  .home-section-head .hs-eyebrow {
    font-size: 10.5px; letter-spacing: 0.22em;
    color: var(--brand-600); font-weight: 700;
  }
  .home-section-head .hs-title {
    font-size: 22px; font-weight: 700; color: var(--ink);
    margin-top: 6px; letter-spacing: -0.01em;
  }
  .home-root .stats-home {
    padding: 0 24px 24px;
    grid-template-columns: repeat(3, 1fr);
  }


  .chip {
    display: inline-flex; align-items: center;
    font-size: 10.5px; padding: 4px 11px; border-radius: 999px;
    background: var(--brand-50); border: 1px solid var(--brand-200);
    color: var(--brand-700); font-weight: 600; letter-spacing: 0.02em;
  }
  h1.h1 {
    font-size: 21px; font-weight: 600; line-height: 1.3;
    letter-spacing: -0.01em; margin: 12px 0 8px; color: var(--ink);
  }
  p.lead {
    font-size: 13px; line-height: 1.85; color: var(--ink-2); margin: 0 0 16px;
  }

  .choice {
    position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; width: 100%; padding: 14px 14px;
    background: #fff; border: 1px solid var(--line);
    border-radius: 16px; margin-bottom: 7px;
    font-size: 13.5px; color: var(--ink); font-weight: 500;
    cursor: pointer; text-align: left;
    transition: border-color .15s, transform .15s, box-shadow .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .choice:hover { border-color: var(--ink); transform: translateY(-1px); box-shadow: 0 4px 14px -8px rgba(15,23,42,0.25); }
  .choice:active { transform: scale(0.985); }
  .choice.primary { background: var(--brand-600); color: #fff; border-color: var(--brand-600); }
  .choice.primary:hover { background: var(--brand-700); border-color: var(--brand-700); }
  .choice.primary .ripple { background: rgba(255,255,255,0.35); }
  .choice .ic {
    width: 32px; height: 32px; border-radius: 10px;
    background: var(--brand-50); color: var(--brand-700);
    display: grid; place-items: center; font-size: 16px; flex-shrink: 0;
  }
  .choice.primary .ic { background: rgba(255,255,255,0.18); color: #fff; }
  .choice .left { display: flex; align-items: center; gap: 12px; min-width: 0; flex: 1; }
  .choice .ttl { display: flex; flex-direction: column; align-items: flex-start; min-width: 0; gap: 2px; }
  .choice .ttl .label { line-height: 1.35; }
  .choice .ttl .hint { font-size: 11px; font-weight: 400; color: var(--ink-3); }
  .choice.primary .ttl .hint { color: rgba(255,255,255,0.78); }
  .choice .arr { color: var(--ink-3); font-size: 16px; flex-shrink: 0; }
  .choice.primary .arr { color: #fff; }

  .employee-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; padding: 12px 14px;
    background: var(--panel); border: 1px solid rgba(15,23,42,0.06);
    border-radius: 16px; margin-top: 14px;
  }
  .employee-row .l .ey { font-size: 9.5px; letter-spacing: 0.22em; color: var(--ink-3); font-weight: 700; }
  .employee-row .l .nm { font-size: 13.5px; font-weight: 500; color: var(--ink); margin-top: 2px; }
  .employee-row .b {
    font-size: 12px; padding: 8px 14px; border-radius: 12px;
    background: #fff; border: 1px solid var(--rule);
    color: var(--ink); font-weight: 500; cursor: pointer;
  }
  .employee-row .b:hover { border-color: var(--ink); }

  .stats {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px;
  }
  .stat {
    background: var(--panel); border-radius: 14px;
    padding: 11px 13px; border: 1px solid rgba(15,23,42,0.06);
  }
  .stat .l { font-size: 9.5px; letter-spacing: 0.22em; color: var(--ink-3); font-weight: 700; }
  .stat .v {
    font-size: 24px; font-weight: 600; letter-spacing: -0.02em;
    margin-top: 6px; color: var(--ink);
  }
  .stat .v .u { font-size: 11px; vertical-align: top; color: var(--ink-2); margin-left: 2px; font-weight: 600; }
  .stat .c { font-size: 10.5px; color: var(--ink-2); margin-top: 6px; line-height: 1.6; }

  .three-strengths { display: grid; gap: 8px; margin-top: 14px; }
  .expandable {
    position: relative; overflow: hidden;
    background: #fff; border: 1px solid var(--line); border-radius: 14px;
    cursor: pointer;
    transition: border-color .18s, transform .12s, box-shadow .18s;
    -webkit-tap-highlight-color: transparent;
  }
  .expandable:hover { border-color: var(--rule); }
  .expandable:active { transform: scale(0.985); }
  .expandable .ex-head {
    padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .expandable .ex-meta { flex: 1; min-width: 0; }
  .expandable .chev {
    width: 26px; height: 26px; border-radius: 8px;
    background: var(--panel); color: var(--ink-2);
    display: grid; place-items: center; font-size: 14px;
    transition: background .18s, color .18s, transform .15s;
    flex-shrink: 0;
  }
  .expandable:hover .chev { background: var(--brand-50); color: var(--brand-700); transform: translateX(2px); }
  .expandable .ex-body { display: none; }
  .expandable .ex-inner {
    padding: 0 14px 14px;
    border-top: 1px dashed var(--line);
    padding-top: 12px;
    animation: fadeInUp .3s ease;
  }

  .detail-root { display: flex; flex-direction: column; gap: 18px; }
  .detail-hero {
    padding: 22px 24px;
    background: linear-gradient(180deg, #F4F7FB 0%, #FAFBFD 100%);
    border-radius: 18px;
    border: 1px solid var(--line);
    position: relative; overflow: hidden;
  }
  .detail-hero::before {
    content: ""; position: absolute;
    top: -60px; right: -40px; width: 240px; height: 240px;
    border-radius: 50%; filter: blur(50px);
    background: radial-gradient(circle, rgba(34,211,238,0.30), transparent 70%);
    pointer-events: none;
  }
  .detail-hero .dh-eyebrow {
    font-size: 10.5px; letter-spacing: 0.22em; color: var(--brand-600); font-weight: 700;
  }
  .detail-hero .dh-title {
    font-size: 26px; font-weight: 700; color: var(--navy);
    line-height: 1.35; letter-spacing: -0.015em; margin-top: 8px; position: relative;
  }
  .detail-hero .dh-lead {
    font-size: 13.5px; line-height: 1.95; color: var(--ink-2);
    margin-top: 12px; max-width: 580px; position: relative;
  }
  .detail-body { display: flex; flex-direction: column; gap: 14px; }
  .detail-card {
    background: #fff; border: 1px solid var(--line);
    border-radius: 14px; padding: 18px 18px;
    animation: fadeInUp .35s ease both;
  }
  .stat-big {
    background: linear-gradient(180deg, #EFF6FF 0%, #FAFBFD 100%);
    border: 1px solid var(--brand-200); border-radius: 16px;
    padding: 28px 24px; text-align: center;
  }
  .stat-big .stat-num {
    font-size: 56px; font-weight: 700; color: var(--navy);
    letter-spacing: -0.03em; line-height: 1;
  }
  .stat-big .stat-num .u { font-size: 22px; vertical-align: top; margin-left: 4px; color: var(--ink-2); }
  .stat-big .stat-cap { font-size: 13px; color: var(--ink-2); margin-top: 14px; line-height: 1.85; }

  .kpi-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px; margin-top: 4px;
  }
  .kpi {
    background: #fff; border: 1px solid var(--line); border-radius: 12px;
    padding: 14px 16px; position: relative; overflow: hidden;
  }
  .kpi::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--brand-600); border-radius: 3px 0 0 3px;
  }
  .kpi .k-l { font-size: 10.5px; letter-spacing: 0.18em; color: var(--ink-3); font-weight: 700; }
  .kpi .k-v {
    font-size: 26px; font-weight: 700; color: var(--navy);
    letter-spacing: -0.025em; line-height: 1; margin-top: 8px;
    font-variant-numeric: tabular-nums;
  }
  .kpi .k-v .u { font-size: 12px; font-weight: 600; color: var(--ink-2); margin-left: 3px; vertical-align: top; }
  .kpi .k-sub { font-size: 11px; color: var(--ink-2); margin-top: 6px; line-height: 1.6; }

  .section-title {
    display: flex; align-items: center; gap: 10px;
    margin-top: 4px;
  }
  .section-title .st-eyebrow {
    font-size: 10px; letter-spacing: 0.22em; color: var(--brand-600); font-weight: 700;
  }
  .section-title .st-line { flex: 1; height: 1px; background: var(--line); }
  .section-title .st-text {
    font-size: 15px; font-weight: 700; color: var(--ink); letter-spacing: -0.005em;
  }

  .flow {
    display: grid; gap: 8px; grid-template-columns: 1fr;
  }
  .flow-step {
    background: #fff; border: 1px solid var(--line); border-radius: 12px;
    padding: 12px 14px; display: grid; grid-template-columns: 48px 1fr; gap: 14px; align-items: flex-start;
    position: relative;
  }
  .flow-step::after {
    content: ""; position: absolute; left: 36px; top: 100%;
    width: 1px; height: 8px; background: var(--brand-200);
  }
  .flow-step:last-child::after { display: none; }
  .flow-step .num {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--brand-50); border: 1px solid var(--brand-200);
    color: var(--brand-700); display: grid; place-items: center;
    font-weight: 700; font-size: 13px;
  }
  .flow-step .ft { font-size: 13.5px; font-weight: 600; color: var(--ink); }

    ic.className = "ic";
    const i = document.createElement("i");

  function spawnSparkles(host, count) {
    const rect = host.getBoundingClientRect();
    const cx = rect.width / 2, cy = rect.height / 3;
    for (let i = 0; i < (count || 6); i++) {
      const s = document.createElement("i");
      s.className = "ti ti-sparkles sparkle";
      const angle = (Math.PI * 2 * i) / (count || 6) + (Math.random() * 0.6);
      const dist = 30 + Math.random() * 25;
      s.style.left = (cx - 7) + "px";
      s.style.top = (cy - 7) + "px";
      s.style.setProperty("--sx", (Math.cos(angle) * dist) + "px");
      s.style.setProperty("--sy", (Math.sin(angle) * dist - 10) + "px");
      s.style.animationDelay = (i * 30) + "ms";
      s.style.fontSize = (12 + Math.random() * 6) + "px";
      host.appendChild(s);
      setTimeout(() => s.remove(), 900 + i * 30);
    }
  }
  function applyFadeUpObserver(root) {
    if (!root) return;
    const els = root.querySelectorAll(".fade-up");
    if (!els.length) return;
    if (typeof IntersectionObserver === "undefined") {
      els.forEach(e => e.classList.add("in-view"));
      return;
    }
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add("in-view");
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.12 });
    els.forEach(e => io.observe(e));
  }

  function addRipple(e, host) {
    const rect = host.getBoundingClientRect();
    const x = (e.clientX || (rect.left + rect.width / 2)) - rect.left;
    const y = (e.clientY || (rect.top + rect.height / 2)) - rect.top;
    const r = Math.max(rect.width, rect.height) * 0.6;
    const span = document.createElement("span");
    span.className = "ripple";
    span.style.left = (x - r) + "px";
    span.style.top = (y - r) + "px";
    span.style.width = (r * 2) + "px";
    span.style.height = (r * 2) + "px";
    host.appendChild(span);
    setTimeout(() => { span.remove(); }, 600);
  }

  function el(tag, attrs, children) {
    const e = document.createElement(tag);
    if (attrs) Object.entries(attrs).forEach(([k, v]) => {
      if (k === "class") e.className = v;
      else if (k === "onclick") e.onclick = v;
      else if (k === "style") e.style.cssText = v;
      else e.setAttribute(k, v);
    });
    if (children != null) (Array.isArray(children) ? children : [children]).forEach(c => {
      if (c == null) return;
      if (typeof c === "string") e.appendChild(document.createTextNode(c));
      else e.appendChild(c);
    });
    return e;
  }

  function renderDetail() {
    const d = currentDetail();
    if (!d) return renderHome();
    const root = el("div", { class: "detail-root" });

    const hero = el("div", { class: "detail-hero" });
    hero.appendChild(el("div", { class: "dh-eyebrow" }, detailSectionLabel(d.dt)));
    hero.appendChild(el("div", { class: "dh-title" }, detailLabel(d.dt, d.idx)));
    hero.appendChild(el("div", { class: "dh-lead" }, detailIntro(d.dt, d.idx)));
    root.appendChild(hero);

    const body = el("div", { class: "detail-body" });

    function appendSectionTitle(parent, eyebrow, text) {
      const st = el("div", { class: "section-title" });
      st.appendChild(el("span", { class: "st-eyebrow" }, eyebrow));
      st.appendChild(el("span", { class: "st-line" }));
      st.appendChild(el("span", { class: "st-text" }, text));
      parent.appendChild(st);
    }
    function appendKPIs(parent, kpis) {
      const row = el("div", { class: "kpi-row" });
      kpis.forEach(k => {
        const c = el("div", { class: "kpi" });
        c.appendChild(el("div", { class: "k-l" }, k.l));
        const v = el("div", { class: "k-v" });
        v.appendChild(document.createTextNode(k.v));
        if (k.u) v.appendChild(el("span", { class: "u" }, k.u));
        c.appendChild(v);
        if (k.sub) c.appendChild(el("div", { class: "k-sub" }, k.sub));
        row.appendChild(c);
      });
      parent.appendChild(row);
    }
    function appendFlow(parent, steps) {
      const f = el("div", { class: "flow" });
      steps.forEach((s, i) => {
        const w = el("div", { class: "flow-step" });
        w.appendChild(el("div", { class: "num" }, String(i + 1).padStart(2, "0")));
        const meta = el("div");
        meta.appendChild(el("div", { class: "ft" }, s.ft));
        meta.appendChild(el("div", { class: "fb" }, s.fb));
        w.appendChild(meta);
        f.appendChild(w);
      });
      parent.appendChild(f);
    }
    function appendCompare(parent, cmp) {
      const w = el("div", { class: "compare" });
      const head = el("div", { class: "head" });
      head.appendChild(el("div", null, cmp.head[0]));
      head.appendChild(el("div", null, cmp.head[1]));
      w.appendChild(head);
      cmp.rows.forEach(r => {
        const row = el("div", { class: "row" });
        row.appendChild(el("div", null, r[0]));
        row.appendChild(el("div", null, r[1]));
        w.appendChild(row);
      });
      parent.appendChild(w);
    }
    function appendSparkline(parent, label, trend) {
      const w = el("div", { class: "sparkline" });
      const head = el("div", { class: "sp-head" });
      head.appendChild(el("span", { class: "sp-l" }, label));
      head.appendChild(el("span", { class: "sp-v" }, trend.vals[trend.vals.length - 1] + ""));
      w.appendChild(head);
      const max = Math.max.apply(null, trend.vals);
      const min = Math.min.apply(null, trend.vals);
      const range = (max - min) || 1;
      const W = 280, H = 56;
      const step = W / (trend.vals.length - 1);
      const points = trend.vals.map((v, i) => {
        const x = i * step;
        const y = H - 6 - ((v - min) / range) * (H - 14);
        return x + "," + y;
      }).join(" ");
      const svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none">' +
        '<polyline points="' + points + '" fill="none" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>' +
        '<circle cx="' + ((trend.vals.length - 1) * step) + '" cy="' + (H - 6 - ((trend.vals[trend.vals.length - 1] - min) / range) * (H - 14)) + '" r="4" fill="#2563EB"/>' +
        '</svg>';
      const svgWrap = el("div");
      svgWrap.innerHTML = svg;
      w.appendChild(svgWrap.firstChild);
      const labels = el("div", { class: "sp-labels" });
      ["6ヶ月前", "5ヶ月前", "4ヶ月前", "3ヶ月前", "先月", "今月"].forEach(t => labels.appendChild(el("span", null, t)));
      w.appendChild(labels);
      if (trend.note) w.appendChild(el("div", { style: "font-size:11.5px; color:var(--ink-2); margin-top:10px; line-height:1.75;" }, trend.note));
      parent.appendChild(w);
    }

    if (d.dt === "strength") {
      const s = strengths[d.idx];
      if (strengthKPIs[d.idx]) appendKPIs(body, strengthKPIs[d.idx]);
      appendSectionTitle(body, "DETAIL", "詳しく見ていく");
      (s.detail || []).forEach(sec => {
        const card = el("div", { class: "detail-card" });
        buildSection(card, sec);
        body.appendChild(card);
      });
      if (strengthFlows[d.idx]) {
        appendSectionTitle(body, "HOW IT WORKS", "実際の流れ");
        appendFlow(body, strengthFlows[d.idx]);
      }
      if (strengthCompare[d.idx]) {
        appendSectionTitle(body, "COMPARE", "他社との違い");
        appendCompare(body, strengthCompare[d.idx]);
      }
    } else if (d.dt === "training") {
      const t = trainings[d.idx];
      const ext = trainingInfo[d.idx];
      if (ext && ext.info) {
        const ig = el("div", { class: "info-grid" });
        Object.keys(ext.info).forEach(k => {
          const c = el("div", { class: "info-card" });
          c.appendChild(el("div", { class: "il" }, k));
          c.appendChild(el("div", { class: "iv" }, ext.info[k]));
          ig.appendChild(c);
        });
        body.appendChild(ig);
      }
      appendSectionTitle(body, "OVERVIEW", "研修の中身");
      (t.detail || []).forEach(sec => {
        const card = el("div", { class: "detail-card" });
        buildSection(card, sec);
        body.appendChild(card);
      });
      if (ext && ext.curriculum) {
        appendSectionTitle(body, "CURRICULUM", "カリキュラム");
        const ul = el("ol", { class: "curri" });
        ext.curriculum.forEach((c, i) => {
          const li = el("li");
          li.appendChild(el("span", { class: "ix" }, "CHAPTER " + String(i + 1).padStart(2, "0")));
          li.appendChild(el("span", { class: "ct" }, c));
          ul.appendChild(li);
        });
        body.appendChild(ul);
      }
      if (ext && ext.skills) {
        appendSectionTitle(body, "SKILLS", "身につく技術");
        const tc = el("div", { class: "tag-cloud" });
        ext.skills.forEach(s => tc.appendChild(el("span", { class: "tg" }, s)));
        body.appendChild(tc);
      }
      if (ext && ext.outputs) {
        appendSectionTitle(body, "OUTPUTS", "成果物（経歴書に書けるもの）");
        const tc = el("div", { class: "tag-cloud" });
        ext.outputs.forEach(s => tc.appendChild(el("span", { class: "tg" }, s)));
        body.appendChild(tc);
      }
    } else if (d.dt === "case") {
      const c = cases[d.idx];
      const max = Math.max.apply(null, c.amounts.map(a => a.income));
      const totalGain = c.amounts[c.amounts.length - 1].income - c.amounts[0].income;

      const graphCard = el("div", { class: "detail-card" });
      const graph = el("div", { class: "income-graph" });
      const gh = el("div", { class: "gh" });
      gh.appendChild(el("span", { class: "gl" }, "ANNUAL INCOME"));
      gh.appendChild(el("span", { class: "gt" }, c.who));
      graph.appendChild(gh);
      c.amounts.forEach((a, ai) => {
        const row = el("div", { class: "bar-row" });
        row.appendChild(el("div", { class: "bar-lbl" }, a.y));
        const track = el("div", { class: "bar-track" });
        const cls = ai === 0 ? "before" : ai === 1 ? "join" : "future";
        const bar = el("div", { class: "bar " + cls });
        track.appendChild(bar);
        row.appendChild(track);
        const valWrap = el("div", { class: "bar-val" });
        valWrap.appendChild(document.createTextNode(a.income + "万"));
        if (ai > 0) {
          const diff = a.income - c.amounts[0].income;
          valWrap.appendChild(el("span", { class: "diff" }, "+" + diff));
        }
        row.appendChild(valWrap);
        graph.appendChild(row);
        const pct = Math.round((a.income / max) * 96) + "%";
        setTimeout(() => { bar.style.width = pct; }, 120 + ai * 240);
      });
      const gain = el("div", { class: "gain" });
      gain.appendChild(el("span", { class: "gain-l" }, "1年でのUP幅"));
      gain.appendChild(el("span", { class: "gain-v" }, "+" + totalGain + "万"));
      graph.appendChild(gain);
      graphCard.appendChild(graph);
      body.appendChild(graphCard);

      const stepsCard = el("div", { class: "detail-card" });
      stepsCard.appendChild(el("div", { class: "sl", style: "font-size:10px; letter-spacing:0.22em; color:var(--brand-600); font-weight:700;" }, "ROLE TIMELINE"));
      const rolesGrid = el("div", { style: "margin-top:10px; display:grid; gap:6px;" });
      c.amounts.forEach(a => {
        const r = el("div", { style: "display:grid; grid-template-columns:80px 1fr; gap:10px; padding:9px 12px; background:var(--panel); border-radius:10px; font-size:12px; align-items:baseline;" });
        r.appendChild(el("span", { style: "color:var(--ink-3); font-weight:700; font-size:10.5px; letter-spacing:0.12em;" }, a.y));
        r.appendChild(el("span", { style: "color:var(--ink); font-weight:500;" }, a.role));
        rolesGrid.appendChild(r);
      });
      stepsCard.appendChild(rolesGrid);
      body.appendChild(stepsCard);

      if (caseSkills[d.idx]) {
        appendSectionTitle(body, "SKILLS BEFORE / AFTER", "1年で伸びたスキル");
        const sc = el("div", { class: "skill-compare detail-card" });
        caseSkills[d.idx].forEach(sk => {
          const row = el("div", { class: "row" });
          row.appendChild(el("div", { class: "lbl" }, sk.l));
          const bars = el("div", { class: "bars" });
          const beforeLine = el("div", { class: "bar-line before" });
          beforeLine.appendChild(el("span", { class: "tag" }, "前"));
          const beforeTrack = el("div", { class: "track" });
          const beforeBar = el("span");
          beforeTrack.appendChild(beforeBar);
          beforeLine.appendChild(beforeTrack);
          beforeLine.appendChild(el("span", { class: "v" }, sk.before + ""));
          bars.appendChild(beforeLine);
          const afterLine = el("div", { class: "bar-line after" });
          afterLine.appendChild(el("span", { class: "tag" }, "後"));
          const afterTrack = el("div", { class: "track" });
          const afterBar = el("span");
          afterTrack.appendChild(afterBar);
          afterLine.appendChild(afterTrack);
          afterLine.appendChild(el("span", { class: "v" }, sk.after + ""));
          bars.appendChild(afterLine);
          row.appendChild(bars);
          sc.appendChild(row);
          setTimeout(() => {
            beforeBar.style.width = sk.before + "%";
            afterBar.style.width = sk.after + "%";
          }, 150);
        });
        body.appendChild(sc);
      }

      if (caseMilestones[d.idx]) {
        appendSectionTitle(body, "MILESTONES", "1年の歩み");
        appendFlow(body, caseMilestones[d.idx].map(m => ({ ft: m.m + " · " + m.t, fb: m.d })));
      }

      appendSectionTitle(body, "STORY", "ご本人の体験");
      const storyCard = el("div", { class: "detail-card" });
      storyCard.appendChild(el("p", { style: "margin:0; font-size:13.5px; color:var(--ink); line-height:1.95;" }, c.story));
      body.appendChild(storyCard);

      const pull = el("blockquote", { class: "quote-pull" }, "「" + c.quote + "」");
      pull.appendChild(el("span", { class: "auth" }, "— " + c.who));
      body.appendChild(pull);
    } else if (d.dt === "benefit") {
      const b = benefits[d.idx];
      const ext = benefitDetailExtras[b.t];
      if (b.detail) {
        const card = el("div", { class: "detail-card" });
        buildSection(card, b.detail);
        body.appendChild(card);
      }
      if (ext && ext.flow) {
        appendSectionTitle(body, "HOW TO USE", "利用の流れ");
        appendFlow(body, ext.flow);
      }
      if (ext && ext.related) {
        appendSectionTitle(body, "RELATED", "関連する制度");
        const r = el("div", { class: "related" });
        r.appendChild(el("div", { class: "rh" }, "あわせて使える制度"));
        const links = el("div", { class: "links" });
        ext.related.forEach(rl => {
          const a = el("a", { onclick: (e) => { e.preventDefault(); vibrate(8); } });
          a.appendChild(el("span", null, rl));
          a.appendChild(el("span", { class: "arr" }, "→"));
          links.appendChild(a);
        });
        r.appendChild(links);
        body.appendChild(r);
      }
    } else if (d.dt === "stat") {
      const s = stats[d.idx];
      const big = el("div", { class: "stat-big" });
      const num = el("div", { class: "stat-num" });
      num.appendChild(document.createTextNode(s.v));
      num.appendChild(el("span", { class: "u" }, s.u));
      big.appendChild(num);
      big.appendChild(el("div", { class: "stat-cap" }, s.c));
      body.appendChild(big);

      if (statTrends[d.idx]) {
        appendSectionTitle(body, "TREND", "直近6ヶ月の推移");
        appendSparkline(body, s.l + " (推移)", statTrends[d.idx]);
      }

      appendSectionTitle(body, "ABOUT", "この数字の意味");
      const card = el("div", { class: "detail-card" });
      buildSection(card, {
        sd: "この数字は社内データから自動反映されています。本番では Googleスプレッドシート、Notion、Supabase などに接続し、毎日更新できます。",
        bullets: [
          "更新頻度：毎日朝6時に自動同期",
          "ソース：社内基幹システム + 採用管理ツール",
          "障害時：前日値を表示し、復旧後に追従"
        ]
      });
      body.appendChild(card);
    } else if (d.dt === "topic") {
      const t = topics[d.idx];
      const card = el("div", { class: "detail-card" });
      card.appendChild(el("div", { style: "font-size:10px; letter-spacing:0.22em; color:var(--brand-600); font-weight:700;" }, t.c));
      card.appendChild(el("p", { style: "margin:10px 0 0; font-size:14px; font-weight:600; color:var(--ink); line-height:1.6;" }, t.t));
      card.appendChild(el("p", { style: "margin:10px 0 0; font-size:13px; color:var(--ink-2); line-height:1.95;" }, t.d));
      body.appendChild(card);

      const rel = topicRelated[d.idx];
      if (rel && rel.length) {
        appendSectionTitle(body, "RELATED", "関連トピック");
        const r = el("div", { class: "related" });
        r.appendChild(el("div", { class: "rh" }, "あわせて読みたい"));
        const links = el("div", { class: "links" });
        rel.forEach(ri => {
          if (!topics[ri]) return;
          const a = el("a", { onclick: (e) => { e.preventDefault(); goDetail("topic", ri); } });
          a.appendChild(el("span", null, topics[ri].t));
          a.appendChild(el("span", { class: "arr" }, "→"));
          links.appendChild(a);
        });
        r.appendChild(links);
        body.appendChild(r);
      }
    }
    root.appendChild(body);

    const ar = el("div", { class: "action-row", style: "margin-top:8px;" });
    const b1 = el("button", { class: "btn outline", onclick: () => back() });
    b1.appendChild(icon("arrow-left"));
    b1.appendChild(document.createTextNode("一覧へ戻る"));
    ar.appendChild(b1);
    const ctaMap = {
      strength: { label: "カジュアル面談へ", goto: "jobseeker.casual", icon: "calendar-check" },
      training: { label: "カジュアル面談へ", goto: "jobseeker.casual", icon: "calendar-check" },
      case: { label: "面談で詳細を聞く", goto: "jobseeker.casual", icon: "calendar-check" },
      benefit: { label: "面談で確認する", goto: "jobseeker.casual", icon: "calendar-check" },
      stat: { label: "ホームに戻る", goto: "home", icon: "home" },
      topic: { label: "ホームに戻る", goto: "home", icon: "home" }
    };
    const cta = ctaMap[d.dt];
    const b2 = el("button", { class: "btn primary", onclick: () => go(cta.goto) });
    b2.appendChild(icon(cta.icon));
    b2.appendChild(document.createTextNode(cta.label));
    ar.appendChild(b2);
    root.appendChild(ar);

    return root;
  }

  function curMeta() {
    if (currentView() === "detail") {
      const d = currentDetail();
      return {
        crumb: [detailSectionLabel(d.dt), detailLabel(d.dt, d.idx)],
        intro: detailIntro(d.dt, d.idx),
        fab: detailLabel(d.dt, d.idx) + " の詳細を見ています"
      };
    }
    return meta[currentView()] || { crumb: ["ホーム"], intro: "", fab: "" };
  }

  function renderCrumb() {
    const m = curMeta();
    const crumb = document.getElementById("vw-crumb");
    crumb.innerHTML = "";
    crumb.appendChild(el("span", { class: "root" }, "CP"));
    m.crumb.forEach((c, i) => {
      crumb.appendChild(el("span", { class: "sep" }, "›"));
      const isLast = i === m.crumb.length - 1;
      crumb.appendChild(el("span", { class: isLast ? "now" : "" }, c));
    });
  }

  function renderTop() {
    const back = document.getElementById("vw-back");
    back.disabled = state.stack.length <= 1;
    const top = document.querySelector(".topbar");
    if (top) top.classList.toggle("is-home", currentView() === "home");

    document.querySelectorAll(".site-tag").forEach(t => {
      const aud = t.getAttribute("data-aud");
      const v = currentView();
      const map = {
        jobseeker: ["jobseeker.menu","jobseeker.company","jobseeker.jobs","jobseeker.jobs.cloud","jobseeker.training","jobseeker.salary","jobseeker.diagnose","jobseeker.casual"],
        business: ["business.menu","business.partner","business.ses","business.ses.cloud","business.project","business.company","business.contact"],
        sales: ["sales.menu","sales.recruit","sales.marketing","sales.dx","sales.training","sales.tools","sales.other","sales.form"],
        employee: ["employee.login","employee.portal"]
      };
      t.classList.toggle("active", (map[aud] || []).indexOf(v) >= 0);
      t.onclick = (e) => {
        addRipple(e, t);
        vibrate(8);
        const target = aud === "jobseeker" ? "jobseeker.menu" :
          aud === "business" ? "business.menu" :
          aud === "sales" ? "sales.menu" : "employee.login";
        setTimeout(() => go(target), 60);
      };
    });
  }

  function renderFab() {
    const txt = document.getElementById("vw-fab-text");
    txt.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>';
    const target = curMeta().fab;
    setTimeout(() => {
      if (curMeta().fab === target) txt.textContent = target;
    }, 500);
    document.getElementById("vw-fab").onclick = () => { vibrate(10); state.sheetOpen = true; render(); };
    document.getElementById("vw-nav").onclick = () => { vibrate(10); state.sheetOpen = true; render(); };
  }

  function renderAside() {
    const aside = document.getElementById("vw-aside");
    if (!aside) return;
    aside.innerHTML = "";

    const ah = el("div", { class: "ah" });
    const av = el("div", { class: "av" });
    av.innerHTML = '<svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg"><circle cx="28" cy="28" r="27" fill="#EFF6FF" stroke="rgba(15,23,42,0.10)"/><path d="M9 50c2-9 9-14 19-14s17 5 19 14v6H9z" fill="#2563EB"/><ellipse cx="28" cy="26" rx="10.5" ry="11.5" fill="#FCE6D2"/><path d="M17 22c1-7.5 6-12.5 11-12.5s10.5 5 11 12.5c0 .5-.2.8-.4 1.1-1.2-2.8-3-5-5.3-6.3-1.3-.8-3-1.2-4-1.2-1.2 0-2.8.4-4.1 1.2-2.3 1.3-4.3 3.5-5.5 6.3-.3-.3-.4-.6-.4-1.1z" fill="#1E3A8A"/><rect x="18" y="27.4" width="2" height="2.8" rx="1" fill="#1E3A8A"/><rect x="36" y="27.4" width="2" height="2.8" rx="1" fill="#1E3A8A"/></svg>';
    ah.appendChild(av);
    const ahm = el("div");
    ahm.appendChild(el("div", { class: "role" }, "AI CONCIERGE"));
    ahm.appendChild(el("div", { class: "nm" }, "アヤ"));
    ah.appendChild(ahm);
    aside.appendChild(ah);

    const bubble = el("div", { class: "bubble" });
    const typing = el("div", { class: "typing" });
    typing.appendChild(el("span"));
    typing.appendChild(el("span"));
    typing.appendChild(el("span"));
    bubble.appendChild(typing);
    aside.appendChild(bubble);
    const targetIntro = curMeta().intro;
    setTimeout(() => {
      if (curMeta().intro === targetIntro) bubble.textContent = targetIntro;
    }, 550);

    aside.appendChild(el("div", { class: "sg-l" }, "SUGGESTIONS"));
    const sg = el("div", { class: "sg" });
    let asideSugs = suggestions[currentView()] || [];
    if (currentView() === "detail") {
      const d = currentDetail();
      asideSugs = [
        { label: "一覧へ戻る", goto: parentViewFor(d.dt), primary: true },
        { label: "ホームに戻る", goto: "home" }
      ];
    }
    asideSugs.forEach(s => {
      const b = el("button", {
        class: s.primary ? "primary" : "",
        onclick: (e) => { addRipple(e, b); vibrate(8); setTimeout(() => go(s.goto), 60); }
      });
      b.appendChild(el("span", null, s.label));
      b.appendChild(el("span", null, "›"));
      sg.appendChild(b);
    });
    aside.appendChild(sg);
    aside.appendChild(el("div", { class: "foot" }, "VANTAGEWORKS · DEMO MODE"));
  }

  function renderSheet() {
    const wrap = document.getElementById("vw-sheet");
    wrap.innerHTML = "";
    if (!state.sheetOpen) return;
    const backdrop = el("div", { class: "sheet-backdrop", onclick: (e) => { if (e.target === backdrop) { state.sheetOpen = false; render(); } } });
    const sheet = el("div", { class: "sheet" });
    sheet.appendChild(el("div", { class: "handle" }));
    const head = el("div", { class: "sh-head" });
    head.appendChild(el("div", { class: "ey" }, "AI CONCIERGE"));
    const close = el("button", { class: "close", onclick: () => { state.sheetOpen = false; render(); } });
    close.appendChild(icon("x"));
    head.appendChild(close);
    sheet.appendChild(head);
    const greet = el("div", { class: "sh-greet" });
    const av = el("div", { class: "av" });
    av.innerHTML = '<svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg"><circle cx="28" cy="28" r="27" fill="#EFF6FF" stroke="rgba(15,23,42,0.10)"/><path d="M9 50c2-9 9-14 19-14s17 5 19 14v6H9z" fill="#2563EB"/><ellipse cx="28" cy="26" rx="10.5" ry="11.5" fill="#FCE6D2"/><path d="M17 22c1-7.5 6-12.5 11-12.5s10.5 5 11 12.5c0 .5-.2.8-.4 1.1-1.2-2.8-3-5-5.3-6.3-1.3-.8-3-1.2-4-1.2-1.2 0-2.8.4-4.1 1.2-2.3 1.3-4.3 3.5-5.5 6.3-.3-.3-.4-.6-.4-1.1z" fill="#1E3A8A"/><rect x="18" y="27.4" width="2" height="2.8" rx="1" fill="#1E3A8A"/><rect x="36" y="27.4" width="2" height="2.8" rx="1" fill="#1E3A8A"/></svg>';
    greet.appendChild(av);
    const gmeta = el("div");
    gmeta.appendChild(el("div", { class: "role" }, "AI CONCIERGE"));
    gmeta.appendChild(el("div", { class: "name" }, "アヤ"));
    greet.appendChild(gmeta);
    sheet.appendChild(greet);
    const bubble = el("div", { class: "sh-bubble" });
    const typing = el("div", { class: "typing" });
    typing.appendChild(el("span"));
    typing.appendChild(el("span"));
    typing.appendChild(el("span"));
    bubble.appendChild(typing);
    sheet.appendChild(bubble);
    setTimeout(() => {
      bubble.textContent = curMeta().intro;
    }, 650);
    sheet.appendChild(el("div", { class: "sh-sgg-l" }, "SUGGESTIONS"));
    const sg = el("div", { class: "sh-suggest" });
    let sheetSugs = suggestions[currentView()] || [];
    if (currentView() === "detail") {
      const d = currentDetail();
      sheetSugs = [
        { label: "一覧へ戻る", goto: parentViewFor(d.dt), primary: true },
        { label: "ホームに戻る", goto: "home" }
      ];
    }
    sheetSugs.forEach(s => {
      const b = el("button", {
        class: s.primary ? "primary" : "",
        onclick: () => { state.sheetOpen = false; go(s.goto); }
      });
      b.appendChild(el("span", null, s.label));
      b.appendChild(el("span", null, "›"));
      sg.appendChild(b);
    });
    sheet.appendChild(sg);
    backdrop.appendChild(sheet);
    wrap.appendChild(backdrop);
  }

  function updateJumpButtons() {
    document.querySelectorAll(".vw-jump").forEach(b => {
      b.classList.toggle("active", b.dataset.view === currentView());
    });
  }

  const autoExpandViews = {
    "jobseeker.company": (idx, total) => "strength-" + idx,
    "jobseeker.training": (idx, total) => "training-" + idx,
    "jobseeker.salary": (idx, total) => idx < 2 ? "case-" + idx : "benefit-" + (idx - 2),
    "smart.data": (idx, total) => idx < 6 ? "stat-" + idx : "topic-" + (idx - 6)
  };
  const autoExpandCounts = {
    "jobseeker.company": 3,
    "jobseeker.training": 5,
    "jobseeker.salary": 10,
    "smart.data": 10
  };

  function applyAutoExpand() {}

  function render() {
    applyAutoExpand();
    renderCrumb();
    renderTop();
    renderView();
    renderFab();
    renderAside();
    renderSheet();
    updateJumpButtons();
    const body = document.getElementById("vw-body");
    applyFadeUpObserver(body);
    if (state.justFinishedDiag) {
      state.justFinishedDiag = false;
      const result = body.querySelector(".result-box");
      if (result) {
        result.style.position = "relative";
        spawnSparkles(result, 7);
        vibrate([10, 60, 10]);
      }
    }
    state.direction = "forward";
  }

  render();
})();
</script>
</body>
</html>
