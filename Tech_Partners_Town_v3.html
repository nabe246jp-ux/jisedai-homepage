<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TECH PARTNERS TOWN v3 — Cozy Night</title>
<style>
  :root{
    --gold:#f5cf8a;
    --text:#fbe9c4;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    width:100%;height:100%;overflow:hidden;
    background:#0a1130;
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
    color:var(--text);
  }

  /* ===== ステージ ===== */
  .scene{
    position:fixed; inset:0;
    background:#0a1130;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }

  /* 画像のラッパ（縦横比固定） */
  .stage{
    position:relative;
    width:min(100vw, calc(100vh * 1.5));
    height:min(100vh, calc(100vw / 1.5));
    box-shadow:0 30px 80px rgba(0,0,0,0.55);
    overflow:hidden;
  }

  .bg{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    user-select:none; pointer-events:none;
    image-rendering:auto;
  }

  /* ヴィネット */
  .vignette{
    position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.45) 100%);
    z-index:5;
  }

  /* ===== 動きのレイヤ ===== */
  .fx-layer{
    position:absolute; inset:0; pointer-events:none;
    z-index:6;
  }

  /* 噴水の水（中央に重ねる） */
  .fountain-fx{
    position:absolute;
    left:46.5%; top:55%;
    width:7%; height:6%;
    pointer-events:none;
    transform:translate(-50%,-50%);
  }
  .fountain-fx svg{width:100%; height:100%; overflow:visible;}
  .water-spray{
    transform-origin:center bottom;
    animation:spray 1.6s infinite ease-in-out;
  }
  .water-drop{
    animation:drop 1.6s infinite ease-in;
  }
  .water-drop.b{animation-delay:-0.3s;}
  .water-drop.c{animation-delay:-0.6s;}
  .water-drop.d{animation-delay:-0.9s;}
  .water-ring{
    transform-origin:center;
    animation:ring 2s infinite ease-out;
    opacity:0;
  }
  .water-ring.b{animation-delay:-1s;}
  @keyframes spray{
    0%,100%{transform:scaleY(0.85) scaleX(1.05);}
    50%{transform:scaleY(1.1) scaleX(0.95);}
  }
  @keyframes drop{
    0%{transform:translateY(-6px) scale(0.8); opacity:0;}
    20%{opacity:1;}
    80%{opacity:1;}
    100%{transform:translateY(20px) scale(0.6); opacity:0;}
  }
  @keyframes ring{
    0%{transform:scale(0.4); opacity:0.7;}
    100%{transform:scale(1.4); opacity:0;}
  }

  /* 街灯のゆらぎ（複数のグロー点） */
  .lamp-fx{
    position:absolute;
    width:80px; height:80px;
    transform:translate(-50%,-50%);
    pointer-events:none;
    border-radius:50%;
    background:radial-gradient(circle, rgba(255,217,130,0.35) 0%, rgba(255,217,130,0.18) 35%, transparent 70%);
    mix-blend-mode:screen;
    animation:lampFlicker 4s infinite ease-in-out;
  }
  .lamp-fx.b{animation-duration:5s; animation-delay:-1.5s;}
  .lamp-fx.c{animation-duration:6s; animation-delay:-2.5s;}
  .lamp-fx.d{animation-duration:4.5s; animation-delay:-0.8s;}
  .lamp-fx.s{width:60px; height:60px;}
  .lamp-fx.l{width:110px; height:110px;}
  @keyframes lampFlicker{
    0%,100%{opacity:0.7; transform:translate(-50%,-50%) scale(1);}
    35%{opacity:0.92; transform:translate(-50%,-50%) scale(1.06);}
    50%{opacity:0.5; transform:translate(-50%,-50%) scale(0.94);}
    65%{opacity:0.95; transform:translate(-50%,-50%) scale(1.08);}
    80%{opacity:0.78; transform:translate(-50%,-50%) scale(1);}
  }

  /* 桜の花びら（落下） */
  .petals{
    position:absolute; inset:0;
    pointer-events:none; overflow:hidden;
    z-index:7;
  }
  .petal{
    position:absolute;
    top:-20px;
    width:10px; height:10px;
    background:radial-gradient(ellipse 60% 100% at 50% 30%, #ffd5e3 0%, #f5a8c3 60%, #e293b3 100%);
    border-radius:0 100% 0 100%;
    opacity:0.85;
    box-shadow:0 0 6px rgba(255,180,210,0.45);
    animation:petalFall linear infinite;
  }
  @keyframes petalFall{
    0%{
      transform:translate(0,-40px) rotate(0deg);
      opacity:0;
    }
    10%{opacity:0.85;}
    90%{opacity:0.7;}
    100%{
      transform:translate(var(--dx, 100px), 110vh) rotate(720deg);
      opacity:0;
    }
  }

  /* ===== 建物クリック領域（透明オーバーレイ） ===== */
  .hotspot{
    position:absolute; cursor:pointer; z-index:10;
    border-radius:14px;
    transition:background 0.25s, box-shadow 0.25s, transform 0.25s;
    background:rgba(255,212,120,0);
  }
  .hotspot:hover{
    background:rgba(255,212,120,0.18);
    box-shadow:0 0 30px rgba(255,212,120,0.35), inset 0 0 20px rgba(255,212,120,0.25);
    transform:scale(1.012);
  }
  .hotspot::after{
    content:attr(data-label);
    position:absolute; top:8px; left:8px;
    padding:5px 11px; border-radius:99px;
    background:rgba(20,28,55,0.85);
    border:1px solid rgba(245,207,138,0.5);
    color:var(--gold);
    font-size:10px; letter-spacing:0.3em; font-weight:700;
    opacity:0; transition:opacity 0.25s;
    pointer-events:none;
  }
  .hotspot:hover::after{opacity:1;}

  /* ===== UI ===== */
  .header{
    position:fixed; top:0; left:0; right:0;
    padding:18px 28px;
    display:flex; align-items:center; justify-content:space-between;
    z-index:30; pointer-events:none;
  }
  .brand{display:flex; align-items:center; gap:10px; pointer-events:auto;}
  .brand .dot{
    width:8px; height:8px; border-radius:50%;
    background:var(--gold); box-shadow:0 0 10px var(--gold);
    animation:pulseDot 2s infinite ease-in-out;
  }
  @keyframes pulseDot{0%,100%{opacity:0.7;}50%{opacity:1;}}
  .brand-name{font-size:13px; letter-spacing:0.4em; color:var(--gold); font-weight:700; text-shadow:0 0 12px rgba(245,207,138,0.5);}
  .nav{display:flex; gap:22px; font-size:11px; letter-spacing:0.3em; color:rgba(251,233,196,0.85); pointer-events:auto; text-shadow:0 1px 3px rgba(0,0,0,0.8);}
  .nav span{cursor:pointer; transition:color 0.2s;}
  .nav span:hover{color:var(--gold);}
  .ver{font-size:10px; letter-spacing:0.3em; color:rgba(251,233,196,0.6); pointer-events:auto;}

  /* 時計 */
  .clock-panel{
    position:fixed; top:64px; right:24px; z-index:30;
    background:rgba(20,28,55,0.82);
    backdrop-filter:blur(14px);
    border:1px solid rgba(245,207,138,0.3);
    border-radius:14px;
    padding:14px 18px;
    text-align:right;
    min-width:190px;
    box-shadow:0 10px 30px rgba(0,0,0,0.45);
  }
  .clock-time{font-size:28px; font-weight:700; letter-spacing:0.08em; color:var(--gold); font-variant-numeric:tabular-nums;}
  .clock-date{font-size:11px; letter-spacing:0.2em; color:rgba(251,233,196,0.75); margin-top:4px;}
  .clock-period{font-size:10px; letter-spacing:0.3em; color:rgba(245,207,138,0.9); margin-top:6px;}

  /* DEMO */
  .demo{
    position:fixed; bottom:18px; left:18px; z-index:30;
    background:rgba(20,28,55,0.82);
    backdrop-filter:blur(14px);
    border:1px solid rgba(245,207,138,0.3);
    border-radius:14px;
    padding:14px 16px;
    min-width:240px;
    box-shadow:0 10px 30px rgba(0,0,0,0.45);
  }
  .demo h4{font-size:10px; letter-spacing:0.35em; color:var(--gold); margin-bottom:10px; font-weight:700;}
  .demo-row{display:flex; gap:6px; margin-bottom:6px; flex-wrap:wrap;}
  .demo button{
    flex:1; min-width:64px;
    padding:8px 10px; border-radius:8px;
    background:rgba(245,207,138,0.12); color:var(--text);
    border:1px solid rgba(245,207,138,0.3);
    font-size:11px; cursor:pointer; transition:all 0.18s;
  }
  .demo button:hover{background:rgba(245,207,138,0.28); transform:translateY(-1px);}
  .demo button.primary{background:rgba(255,180,80,0.28); border-color:rgba(255,180,80,0.6);}
  .demo .hint{font-size:10px; color:rgba(251,233,196,0.55); margin-top:6px;}

  /* KPI */
  .kpi{
    position:fixed; bottom:18px; right:18px; z-index:30;
    background:rgba(20,28,55,0.82);
    backdrop-filter:blur(14px);
    border:1px solid rgba(245,207,138,0.3);
    border-radius:14px;
    padding:14px 18px;
    min-width:280px;
    box-shadow:0 10px 30px rgba(0,0,0,0.45);
  }
  .kpi h4{font-size:10px; letter-spacing:0.35em; color:var(--gold); margin-bottom:10px; font-weight:700;}
  .kpi-row{display:flex; justify-content:space-between; padding:5px 0; font-size:12px;}
  .kpi-row .k{color:rgba(251,233,196,0.7);}
  .kpi-row .v{color:var(--gold); font-weight:700; font-variant-numeric:tabular-nums;}

  /* 詳細 */
  .detail{
    position:fixed; top:0; right:-460px; bottom:0;
    width:440px; max-width:92vw;
    background:rgba(14,20,42,0.96);
    backdrop-filter:blur(18px);
    border-left:1px solid rgba(245,207,138,0.3);
    z-index:50;
    transition:right 0.4s cubic-bezier(0.5,0,0.2,1);
    padding:60px 32px 30px;
    overflow-y:auto;
  }
  .detail.open{right:0;}
  .detail-close{
    position:absolute; top:16px; right:16px;
    width:36px; height:36px; border-radius:50%;
    background:rgba(245,207,138,0.18);
    border:1px solid rgba(245,207,138,0.35);
    color:var(--gold); font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .detail h2{font-size:24px; color:var(--gold); margin-bottom:6px; font-weight:700; letter-spacing:0.08em;}
  .detail .badge{display:inline-block; padding:4px 12px; background:rgba(245,207,138,0.18); border:1px solid rgba(245,207,138,0.35); border-radius:99px; font-size:10px; letter-spacing:0.3em; color:var(--gold); margin-bottom:18px;}
  .detail p{font-size:13px; line-height:1.85; color:rgba(251,233,196,0.85); margin-bottom:14px;}
  .detail .feature{background:rgba(245,207,138,0.06); border:1px solid rgba(245,207,138,0.2); border-radius:10px; padding:14px 16px; margin-bottom:10px;}
  .detail .feature h3{font-size:13px; color:var(--gold); margin-bottom:6px;}
  .detail .feature p{font-size:12px; line-height:1.7; margin:0; color:rgba(251,233,196,0.78);}

  .hint-bar{
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    background:rgba(14,20,42,0.9); border:1px solid rgba(245,207,138,0.35);
    border-radius:99px; padding:8px 18px;
    font-size:12px; color:var(--gold); letter-spacing:0.1em;
    z-index:40; opacity:0; transition:opacity 0.4s; pointer-events:none;
  }
  .hint-bar.show{opacity:1;}

  /* 操作のお知らせ（初回） */
  .first-hint{
    position:fixed; top:54%; left:50%; transform:translate(-50%,0);
    background:rgba(14,20,42,0.85); border:1px solid rgba(245,207,138,0.35);
    border-radius:14px; padding:10px 18px;
    font-size:11px; color:rgba(251,233,196,0.85); letter-spacing:0.05em;
    z-index:35; pointer-events:none;
    animation:fadeOut 6s forwards;
  }
  @keyframes fadeOut{
    0%,60%{opacity:0.95;}
    100%{opacity:0;}
  }

  @media(max-width:720px){
    .clock-panel{top:56px; right:8px; padding:10px 12px; min-width:auto;}
    .clock-time{font-size:20px;}
    .demo{left:8px; right:8px; bottom:8px; min-width:auto;}
    .kpi{display:none;}
    .nav{display:none;}
  }
</style>
</head>
<body>

<div class="scene">
  <div class="stage" id="stage">
    <img class="bg" src="v3-sample.jpg" alt="Tech Partners Town" />
    <div class="vignette"></div>

    <!-- ============ 動きのレイヤ ============ -->
    <div class="fx-layer">
      <!-- 噴水の水 -->
      <div class="fountain-fx">
        <svg viewBox="-50 -60 100 100" xmlns="http://www.w3.org/2000/svg">
          <!-- 水しぶきの輪 -->
          <ellipse class="water-ring" cx="0" cy="20" rx="22" ry="6" fill="none" stroke="#a3f0ed" stroke-width="2"/>
          <ellipse class="water-ring b" cx="0" cy="20" rx="22" ry="6" fill="none" stroke="#a3f0ed" stroke-width="2"/>
          <!-- 噴き上がる水柱 -->
          <g class="water-spray">
            <path d="M-3 0 Q0 -34 3 0 Z" fill="#a3f0ed" opacity="0.75"/>
            <path d="M-1 -8 Q0 -28 1 -8 Z" fill="#d8f8f5" opacity="0.9"/>
          </g>
          <!-- 水滴 -->
          <circle class="water-drop" cx="-8" cy="-10" r="2" fill="#a3f0ed"/>
          <circle class="water-drop b" cx="8" cy="-12" r="2" fill="#a3f0ed"/>
          <circle class="water-drop c" cx="-4" cy="-15" r="1.5" fill="#d8f8f5"/>
          <circle class="water-drop d" cx="6" cy="-9" r="1.5" fill="#d8f8f5"/>
        </svg>
      </div>

      <!-- 街灯のゆらぎ（画像内の街灯にだいたい合わせて配置） -->
      <div class="lamp-fx s"   style="left:6%;  top:53%;"></div>
      <div class="lamp-fx b"   style="left:14%; top:64%;"></div>
      <div class="lamp-fx"     style="left:30%; top:42%;"></div>
      <div class="lamp-fx c"   style="left:34%; top:67%;"></div>
      <div class="lamp-fx s b" style="left:40%; top:30%;"></div>
      <div class="lamp-fx"     style="left:45%; top:78%;"></div>
      <div class="lamp-fx l c" style="left:53%; top:60%;"></div>
      <div class="lamp-fx"     style="left:54%; top:30%;"></div>
      <div class="lamp-fx b"   style="left:61%; top:62%;"></div>
      <div class="lamp-fx s d" style="left:67%; top:48%;"></div>
      <div class="lamp-fx c"   style="left:75%; top:30%;"></div>
      <div class="lamp-fx"     style="left:78%; top:62%;"></div>
      <div class="lamp-fx s b" style="left:90%; top:35%;"></div>
      <div class="lamp-fx d"   style="left:94%; top:62%;"></div>
    </div>

    <!-- 桜の花びら -->
    <div class="petals" id="petals"></div>

    <!-- ============ 建物クリック領域 ============ -->
    <!-- 座標は画像基準で % 指定 -->
    <!-- 左上の大きなコテージ → RESEARCH -->
    <div class="hotspot" data-key="training" data-label="RESEARCH"
         style="left:5%; top:14%; width:24%; height:30%;"></div>

    <!-- 右上の大きな青屋根の建物 → BUSINESS -->
    <div class="hotspot" data-key="business" data-label="BUSINESS"
         style="left:42%; top:6%; width:32%; height:35%;"></div>

    <!-- 左下の赤い天蓋のレストラン → BENEFIT -->
    <div class="hotspot" data-key="welfare" data-label="BENEFIT"
         style="left:7%; top:60%; width:25%; height:25%;"></div>

    <!-- 中央下の青屋根の大きな建物 → COMPANY -->
    <div class="hotspot" data-key="company" data-label="COMPANY"
         style="left:30%; top:62%; width:30%; height:32%;"></div>

    <!-- 中央の噴水 → PLAZA -->
    <div class="hotspot" data-key="plaza" data-label="PLAZA"
         style="left:38%; top:46%; width:14%; height:18%;"></div>
  </div>
</div>

<!-- ===== UI ===== -->
<header class="header">
  <div class="brand">
    <div class="dot"></div>
    <div class="brand-name">TECH PARTNERS TOWN</div>
  </div>
  <div class="nav">
    <span>RESEARCH</span>
    <span>BUSINESS</span>
    <span>BENEFIT</span>
    <span>COMPANY</span>
  </div>
  <div class="ver">v3 — COZY NIGHT</div>
</header>

<div class="clock-panel">
  <div class="clock-time" id="clockTime">--:--:--</div>
  <div class="clock-date" id="clockDate">----/--/-- (--)</div>
  <div class="clock-period" id="clockPeriod">— NIGHT —</div>
</div>

<div class="kpi">
  <h4>LIVE KPI</h4>
  <div class="kpi-row"><span class="k">本日の来訪者</span><span class="v" id="kpiVisitors">287</span></div>
  <div class="kpi-row"><span class="k">稼働中AI</span><span class="v" id="kpiAi">14</span></div>
  <div class="kpi-row"><span class="k">月間売上 (万円)</span><span class="v" id="kpiRevenue">18,420</span></div>
  <div class="kpi-row"><span class="k">月間利益 (万円)</span><span class="v" id="kpiProfit">4,280</span></div>
  <div class="kpi-row"><span class="k">在籍社員</span><span class="v" id="kpiEmployees">1,820</span></div>
</div>

<div class="demo">
  <h4>DEMO CONTROLS</h4>
  <div class="demo-row">
    <button id="btnHour">+1時間</button>
    <button id="btnDay">+1日</button>
    <button id="btnWeek">+1週</button>
  </div>
  <div class="demo-row">
    <button id="btnRand" class="primary">KPI更新</button>
    <button id="btnReset">リセット</button>
  </div>
  <div class="hint">建物にカーソルを合わせるとラベルが出ます</div>
</div>

<div class="first-hint">建物の上にマウスを乗せて、クリックしてみてください</div>
<div class="hint-bar" id="hintBar">+1時間 進めました</div>

<aside class="detail" id="detail">
  <button class="detail-close" id="detailClose">×</button>
  <div id="detailContent"></div>
</aside>

<script>
  // ===== 状態 =====
  const state = {
    virtualDate: (function(){const d=new Date(); d.setHours(20,30,0,0); return d;})(),
    kpis: { visitors:287, ai:14, revenue:18420, profit:4280, employees:1820 },
  };
  const baseKpi = {...state.kpis};

  const $time = document.getElementById('clockTime');
  const $date = document.getElementById('clockDate');
  const $period = document.getElementById('clockPeriod');
  const wd = ['日','月','火','水','木','金','土'];
  const fmt = n => String(n).padStart(2,'0');

  function updateClock(){
    const d = state.virtualDate;
    $time.textContent = `${fmt(d.getHours())}:${fmt(d.getMinutes())}:${fmt(d.getSeconds())}`;
    $date.textContent = `${d.getFullYear()}/${fmt(d.getMonth()+1)}/${fmt(d.getDate())} (${wd[d.getDay()]})`;
    const h = d.getHours();
    let p = '— NIGHT —';
    if(h>=5 && h<10) p='— MORNING —';
    else if(h>=10 && h<16) p='— DAYTIME —';
    else if(h>=16 && h<19) p='— SUNSET —';
    $period.textContent = p;
  }

  function updateKpi(){
    const k = state.kpis;
    document.getElementById('kpiVisitors').textContent = k.visitors.toLocaleString();
    document.getElementById('kpiAi').textContent = k.ai.toLocaleString();
    document.getElementById('kpiRevenue').textContent = k.revenue.toLocaleString();
    document.getElementById('kpiProfit').textContent = k.profit.toLocaleString();
    document.getElementById('kpiEmployees').textContent = k.employees.toLocaleString();
  }

  function jitter(n, pct, integer=false){
    const delta = n * pct * (Math.random()*2 - 1);
    const v = n + delta;
    return integer ? Math.round(v) : Math.round(v*10)/10;
  }
  function randomizeKpi(){
    state.kpis = {
      visitors: Math.max(0, Math.round(jitter(state.kpis.visitors, 0.20, true))),
      ai: Math.max(0, Math.round(jitter(state.kpis.ai, 0.30, true))),
      revenue: Math.round(jitter(state.kpis.revenue, 0.06)),
      profit: Math.round(jitter(state.kpis.profit, 0.08)),
      employees: Math.max(1500, Math.round(jitter(state.kpis.employees, 0.01, true))),
    };
    updateKpi();
  }

  setInterval(()=>{
    state.virtualDate = new Date(state.virtualDate.getTime() + 1000);
    updateClock();
  }, 1000);
  setInterval(()=>{ randomizeKpi(); }, 8000);

  function showHint(t){
    const $h = document.getElementById('hintBar');
    $h.textContent = t;
    $h.classList.add('show');
    clearTimeout(showHint._t);
    showHint._t = setTimeout(()=>$h.classList.remove('show'), 1400);
  }
  document.getElementById('btnHour').onclick = ()=>{
    state.virtualDate = new Date(state.virtualDate.getTime() + 3600*1000);
    updateClock(); showHint('+1時間 進めました');
  };
  document.getElementById('btnDay').onclick = ()=>{
    state.virtualDate = new Date(state.virtualDate.getTime() + 24*3600*1000);
    updateClock(); randomizeKpi(); showHint('+1日 進めました');
  };
  document.getElementById('btnWeek').onclick = ()=>{
    state.virtualDate = new Date(state.virtualDate.getTime() + 7*24*3600*1000);
    updateClock(); randomizeKpi(); showHint('+1週 進めました');
  };
  document.getElementById('btnRand').onclick = ()=>{ randomizeKpi(); showHint('KPIを更新しました'); };
  document.getElementById('btnReset').onclick = ()=>{
    const d = new Date(); d.setHours(20,30,0,0);
    state.virtualDate = d;
    state.kpis = {...baseKpi};
    updateClock(); updateKpi(); showHint('リセットしました');
  };

  const details = {
    training: {

  // ===== 桜の花びら生成 =====
  (function petalSpawner(){
    const wrap = document.getElementById('petals');
    if(!wrap) return;
    function spawn(){
      const p = document.createElement('div');
      p.className = 'petal';
      const startX = Math.random()*100;
      const drift = (Math.random()*200 - 100); // 左右の流れ
      const duration = 8 + Math.random()*8;     // 8〜16秒
      const delay = Math.random()*4;
      const size = 7 + Math.random()*7;         // 7〜14px
      const rot = Math.random()*360;
      p.style.left = startX + '%';
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.setProperty('--dx', drift + 'px');
      p.style.animationDuration = duration + 's';
      p.style.animationDelay = (-delay) + 's';
      p.style.transform = `rotate(${rot}deg)`;
      wrap.appendChild(p);
      // 終わったら消す
      setTimeout(()=>p.remove(), (duration+1)*1000);
    }
    // 初期に少しだけ散らす
    for(let i=0;i<5;i++) spawn();
    // ゆっくりめの間隔で追加
    setInterval(spawn, 1800);
  })();
</script>
