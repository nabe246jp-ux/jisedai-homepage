<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TECH PARTNERS TOWN v3 — Cozy Night</title>
<style>
  :root{
    --sky-top:#0a1130;
    --sky-mid:#162048;
    --sky-bottom:#2a2c5a;
    --gold:#f5cf8a;
    --text:#fbe9c4;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:#0a1130;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;color:var(--text);}

  .scene{
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse at 75% 5%, rgba(255,220,160,0.10) 0%, transparent 40%),
      radial-gradient(ellipse at 20% 0%, rgba(120,140,220,0.18) 0%, transparent 50%),
      linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 45%, var(--sky-bottom) 100%);
    overflow:hidden;
  }
  .stars{position:absolute; inset:0; pointer-events:none;}
  .stars span{
    position:absolute; width:2px; height:2px; border-radius:50%;
    background:#ffffff; opacity:0.8;
    box-shadow:0 0 4px rgba(255,255,255,0.6);
    animation:twinkle 3s infinite ease-in-out;
  }
  @keyframes twinkle{0%,100%{opacity:0.3;}50%{opacity:0.95;}}
  .moon{
    position:absolute; top:5%; right:8%;
    width:70px;height:70px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #fff8e0 0%, #f5cf8a 60%, #c8a058 100%);
    box-shadow:0 0 50px rgba(245,207,138,0.45), 0 0 100px rgba(245,207,138,0.22);
  }

  .town-wrap{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;}
  svg.town{
    width:min(1500px, 98vw);
    height:auto;
    max-height:90vh;
    filter:drop-shadow(0 20px 40px rgba(0,0,0,0.5));
    image-rendering:auto;
  }

  /* 窓のちらつき */
  @keyframes flicker{0%,100%{opacity:1;}48%{opacity:0.94;}50%{opacity:0.78;}52%{opacity:0.96;}}
  .win{animation:flicker 5s infinite ease-in-out;}
  .win.b{animation-duration:7s; animation-delay:-2s;}
  .win.c{animation-duration:6s; animation-delay:-4s;}
  .win.d{animation-duration:8s; animation-delay:-1.5s;}

  @keyframes lampPulse{0%,100%{opacity:0.85;}50%{opacity:1;}}
  .lamp-glow{animation:lampPulse 4s infinite ease-in-out;}

  @keyframes waterShimmer{0%,100%{transform:translateY(0) scaleX(1);}50%{transform:translateY(-1px) scaleX(0.97);}}
  .water-top{animation:waterShimmer 2.4s infinite ease-in-out;}

  @keyframes sway{0%,100%{transform:rotate(-1deg);}50%{transform:rotate(1deg);}}
  .sakura-leaf{animation:sway 5s infinite ease-in-out; transform-origin:center bottom;}

  .building{cursor:pointer; transition:transform 0.25s ease, filter 0.25s ease;}
  .building:hover{transform:translateY(-3px); filter:brightness(1.15) drop-shadow(0 0 14px rgba(255,212,120,0.55));}

  @keyframes walk{
    0%{transform:translate(0,0);}
    25%{transform:translate(6px,-3px);}
    50%{transform:translate(12px,0);}
    75%{transform:translate(6px,3px);}
    100%{transform:translate(0,0);}
  }
  .npc{animation:walk 6s infinite linear;}
  .npc.b{animation-duration:8s; animation-delay:-2s;}
  .npc.c{animation-duration:7s; animation-delay:-4s;}
  .npc.d{animation-duration:9s; animation-delay:-1s;}

  /* 水面の波紋 */
  @keyframes ripple{0%,100%{opacity:0.4;}50%{opacity:0.8;}}
  .ripple{animation:ripple 3s infinite ease-in-out;}
  .ripple.b{animation-delay:-1.5s;}

  /* ===== UI ===== */
  .header{position:fixed; top:0; left:0; right:0; padding:18px 28px; display:flex; align-items:center; justify-content:space-between; z-index:30; pointer-events:none;}
  .brand{display:flex; align-items:center; gap:10px; pointer-events:auto;}
  .brand .dot{width:8px; height:8px; border-radius:50%; background:var(--gold); box-shadow:0 0 10px var(--gold);}
  .brand-name{font-size:13px; letter-spacing:0.4em; color:var(--gold); font-weight:700;}
  .nav{display:flex; gap:22px; font-size:11px; letter-spacing:0.3em; color:rgba(251,233,196,0.6); pointer-events:auto;}
  .ver{font-size:10px; letter-spacing:0.3em; color:rgba(251,233,196,0.45); pointer-events:auto;}

  .clock-panel{
    position:fixed; top:64px; right:24px; z-index:30;
    background:rgba(20,28,55,0.78); backdrop-filter:blur(12px);
    border:1px solid rgba(245,207,138,0.25); border-radius:14px;
    padding:14px 18px; text-align:right; min-width:180px;
    box-shadow:0 8px 28px rgba(0,0,0,0.4);
  }
  .clock-time{font-size:26px; font-weight:700; letter-spacing:0.08em; color:var(--gold); font-variant-numeric:tabular-nums;}
  .clock-date{font-size:11px; letter-spacing:0.2em; color:rgba(251,233,196,0.7); margin-top:4px;}
  .clock-period{font-size:10px; letter-spacing:0.3em; color:rgba(245,207,138,0.85); margin-top:6px;}

  .demo{
    position:fixed; bottom:18px; left:18px; z-index:30;
    background:rgba(20,28,55,0.78); backdrop-filter:blur(12px);
    border:1px solid rgba(245,207,138,0.25); border-radius:14px;
    padding:14px 16px; min-width:240px;
    box-shadow:0 8px 28px rgba(0,0,0,0.4);
  }
  .demo h4{font-size:10px; letter-spacing:0.35em; color:var(--gold); margin-bottom:10px; font-weight:700;}
  .demo-row{display:flex; gap:6px; margin-bottom:6px; flex-wrap:wrap;}
  .demo button{
    flex:1; min-width:64px; padding:8px 10px; border-radius:8px;
    background:rgba(245,207,138,0.12); color:var(--text);
    border:1px solid rgba(245,207,138,0.3);
    font-size:11px; cursor:pointer; transition:all 0.18s;
  }
  .demo button:hover{background:rgba(245,207,138,0.25); transform:translateY(-1px);}
  .demo button.primary{background:rgba(255,180,80,0.25); border-color:rgba(255,180,80,0.55);}
  .demo .hint{font-size:10px; color:rgba(251,233,196,0.5); margin-top:6px;}

  .kpi{
    position:fixed; bottom:18px; right:18px; z-index:30;
    background:rgba(20,28,55,0.78); backdrop-filter:blur(12px);
    border:1px solid rgba(245,207,138,0.25); border-radius:14px;
    padding:14px 18px; min-width:280px;
    box-shadow:0 8px 28px rgba(0,0,0,0.4);
  }
  .kpi h4{font-size:10px; letter-spacing:0.35em; color:var(--gold); margin-bottom:10px; font-weight:700;}
  .kpi-row{display:flex; justify-content:space-between; padding:5px 0; font-size:12px;}
  .kpi-row .k{color:rgba(251,233,196,0.65);}
  .kpi-row .v{color:var(--gold); font-weight:700; font-variant-numeric:tabular-nums;}

  .detail{
    position:fixed; top:0; right:-460px; bottom:0;
    width:440px; max-width:92vw;
    background:rgba(14,20,42,0.95); backdrop-filter:blur(16px);
    border-left:1px solid rgba(245,207,138,0.28);
    z-index:50; transition:right 0.4s cubic-bezier(0.5,0,0.2,1);
    padding:60px 32px 30px; overflow-y:auto; color:var(--text);
  }
  .detail.open{right:0;}
  .detail-close{
    position:absolute; top:16px; right:16px; width:36px; height:36px;
    border-radius:50%; background:rgba(245,207,138,0.15);
    border:1px solid rgba(245,207,138,0.3); color:var(--gold);
    font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .detail h2{font-size:24px; color:var(--gold); margin-bottom:6px; font-weight:700; letter-spacing:0.08em;}
  .detail .badge{display:inline-block; padding:4px 12px; background:rgba(245,207,138,0.18); border:1px solid rgba(245,207,138,0.35); border-radius:99px; font-size:10px; letter-spacing:0.3em; color:var(--gold); margin-bottom:18px;}
  .detail p{font-size:13px; line-height:1.85; color:rgba(251,233,196,0.85); margin-bottom:14px;}
  .detail .feature{background:rgba(245,207,138,0.06); border:1px solid rgba(245,207,138,0.18); border-radius:10px; padding:14px 16px; margin-bottom:10px;}
  .detail .feature h3{font-size:13px; color:var(--gold); margin-bottom:6px;}
  .detail .feature p{font-size:12px; line-height:1.7; margin:0; color:rgba(251,233,196,0.75);}

  .hint-bar{
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    background:rgba(14,20,42,0.86); border:1px solid rgba(245,207,138,0.3);
    border-radius:99px; padding:8px 18px;
    font-size:12px; color:var(--gold); letter-spacing:0.1em;
    z-index:40; opacity:0; transition:opacity 0.5s; pointer-events:none;
  }
  .hint-bar.show{opacity:1;}
  .vignette{position:fixed; inset:0; pointer-events:none; background:radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.55) 100%); z-index:5;}

  @media(max-width:720px){
    .clock-panel{top:56px; right:8px; padding:10px 12px; min-width:auto;}
    .clock-time{font-size:20px;}
    .demo{left:8px; right:8px; bottom:8px; min-width:auto;}
    .kpi{display:none;}
    .nav{display:none;}
  }
</style>
</head>
<body>

<div class="scene">
  <div class="stars" id="stars"></div>
  <div class="moon"></div>

  <div class="town-wrap">
    <svg class="town" viewBox="0 0 1600 1100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- グラデーション -->
        <linearGradient id="wallA" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#f0d9a8"/><stop offset="1" stop-color="#cfa978"/>
        </linearGradient>
        <linearGradient id="wallB" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#d4b27c"/><stop offset="1" stop-color="#9a7d50"/>
        </linearGradient>
        <linearGradient id="wallC" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#e8d4a0"/><stop offset="1" stop-color="#b89060"/>
        </linearGradient>
        <linearGradient id="roofBlue" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#4a5c98"/><stop offset="1" stop-color="#1f2a5a"/>
        </linearGradient>
        <linearGradient id="roofBlueDark" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#2c3a6b"/><stop offset="1" stop-color="#161e3c"/>
        </linearGradient>
        <linearGradient id="roofBrown" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#7a4030"/><stop offset="1" stop-color="#3a1f18"/>
        </linearGradient>
        <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#42507a"/><stop offset="1" stop-color="#2a3350"/>
        </linearGradient>
        <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#2a4070"/><stop offset="1" stop-color="#16284a"/>
        </linearGradient>

        <radialGradient id="lampHalo">
          <stop offset="0" stop-color="#ffd982" stop-opacity="0.85"/>
          <stop offset="0.5" stop-color="#ffd982" stop-opacity="0.25"/>
          <stop offset="1" stop-color="#ffd982" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="winGlow">
          <stop offset="0" stop-color="#fff0c0"/><stop offset="1" stop-color="#ffb148"/>
        </radialGradient>
        <radialGradient id="winGlowBig">
          <stop offset="0" stop-color="#fff5d0"/><stop offset="1" stop-color="#ffc070"/>
        </radialGradient>
        <radialGradient id="fountainHalo">
          <stop offset="0" stop-color="#a3f0ed" stop-opacity="0.6"/>
          <stop offset="1" stop-color="#a3f0ed" stop-opacity="0"/>
        </radialGradient>

        <!-- 屋根瓦パターン -->
        <pattern id="tiles" width="14" height="6" patternUnits="userSpaceOnUse" patternTransform="skewX(-30)">
          <rect width="14" height="6" fill="#2c3a6b"/>
          <rect width="13" height="5" fill="#3a4a85"/>
          <line x1="0" y1="6" x2="14" y2="6" stroke="#161e3c" stroke-width="0.5"/>
          <line x1="7" y1="0" x2="7" y2="6" stroke="#161e3c" stroke-width="0.5"/>
        </pattern>

        <!-- 桜のシンボル（雲のように積み重ね） -->
        <symbol id="sakura" viewBox="-40 -90 80 100">
          <rect x="-3" y="-15" width="6" height="20" fill="#3a2a1a"/>
          <rect x="-2" y="-25" width="4" height="14" fill="#2a1a10"/>
          <g class="sakura-leaf">
            <ellipse cx="-12" cy="-50" rx="16" ry="14" fill="#f5a8c3"/>
            <ellipse cx="14" cy="-52" rx="18" ry="15" fill="#f5a8c3"/>
            <ellipse cx="-2" cy="-65" rx="18" ry="14" fill="#ffc0d8"/>
            <ellipse cx="-20" cy="-38" rx="13" ry="11" fill="#e293b3"/>
            <ellipse cx="18" cy="-36" rx="13" ry="11" fill="#e293b3"/>
            <ellipse cx="6" cy="-44" rx="14" ry="12" fill="#ffc0d8"/>
            <ellipse cx="-8" cy="-30" rx="10" ry="9" fill="#e293b3"/>
            <!-- 花びらの白いハイライト -->
            <circle cx="-8" cy="-58" r="2" fill="#fff0f5" opacity="0.7"/>
            <circle cx="10" cy="-55" r="2" fill="#fff0f5" opacity="0.7"/>
            <circle cx="-2" cy="-65" r="2.5" fill="#fff0f5" opacity="0.8"/>
          </g>
        </symbol>

        <!-- 街灯 -->
        <symbol id="lamp" viewBox="-15 -55 30 60">
          <rect x="-1.2" y="-42" width="2.5" height="44" fill="#0a0a18"/>
          <path d="M-7 -42 L7 -42 L5 -48 L-5 -48 Z" fill="#0a0a18"/>
          <rect x="-4" y="-49" width="8" height="2" fill="#0a0a18"/>
          <circle cx="0" cy="-44" r="3" fill="#fff5d0"/>
          <circle class="lamp-glow" cx="0" cy="-44" r="24" fill="url(#lampHalo)"/>
        </symbol>

        <!-- 茂み -->
        <symbol id="bush" viewBox="-22 -16 44 22">
          <ellipse cx="-8" cy="0" rx="10" ry="6" fill="#3a6244"/>
          <ellipse cx="8" cy="0" rx="10" ry="6" fill="#3a6244"/>
          <ellipse cx="0" cy="-5" rx="11" ry="7" fill="#4f8259"/>
          <ellipse cx="-4" cy="-3" rx="3" ry="2" fill="#6da872" opacity="0.7"/>
        </symbol>

        <!-- 樽 -->
        <symbol id="barrel" viewBox="-6 -10 12 16">
          <ellipse cx="0" cy="3" rx="5" ry="1.6" fill="#3a2a1a"/>
          <rect x="-5" y="-7" width="10" height="10" fill="#7a5028" rx="1"/>
          <rect x="-5" y="-5" width="10" height="1" fill="#3a2a1a"/>
          <rect x="-5" y="-1" width="10" height="1" fill="#3a2a1a"/>
          <ellipse cx="0" cy="-7" rx="5" ry="1.6" fill="#a06030"/>
        </symbol>

        <!-- 木箱 -->
        <symbol id="crate" viewBox="-7 -10 14 14">
          <rect x="-7" y="-9" width="14" height="12" fill="#9a6840" stroke="#5a3820" stroke-width="0.6"/>
          <line x1="-7" y1="-3" x2="7" y2="-3" stroke="#5a3820" stroke-width="0.6"/>
          <line x1="0" y1="-9" x2="0" y2="3" stroke="#5a3820" stroke-width="0.6"/>
        </symbol>

        <!-- ベンチ -->
        <symbol id="bench" viewBox="-18 -10 36 14">
          <rect x="-15" y="0" width="30" height="3" fill="#5a4030" rx="1"/>
          <rect x="-15" y="-7" width="30" height="2.5" fill="#7a5a40" rx="1"/>
          <rect x="-13" y="3" width="2" height="3" fill="#3a2418"/>
          <rect x="11" y="3" width="2" height="3" fill="#3a2418"/>
        </symbol>

        <!-- 提灯 -->
        <symbol id="lantern" viewBox="-6 -14 12 16">
          <rect x="-0.6" y="-14" width="1.2" height="3" fill="#1a1a28"/>
          <ellipse cx="0" cy="-7" rx="5" ry="6" fill="#ffc060" stroke="#7a4020" stroke-width="0.6"/>
          <line x1="-5" y1="-7" x2="5" y2="-7" stroke="#7a4020" stroke-width="0.4"/>
          <line x1="-4" y1="-10" x2="4" y2="-10" stroke="#7a4020" stroke-width="0.3" opacity="0.5"/>
          <line x1="-4" y1="-4" x2="4" y2="-4" stroke="#7a4020" stroke-width="0.3" opacity="0.5"/>
          <circle cx="0" cy="-7" r="9" fill="url(#lampHalo)" opacity="0.5"/>
        </symbol>

        <filter id="softShadow"><feGaussianBlur stdDeviation="2"/></filter>
      </defs>

      <!-- ===== 遠景（山影） ===== -->
      <g opacity="0.4">
        <path d="M0 380 L260 250 L420 350 L580 240 L760 360 L900 280 L1080 380 L1280 290 L1480 380 L1600 350 L1600 460 L0 460 Z" fill="#1a234a"/>
        <path d="M0 430 L200 360 L360 430 L560 380 L720 440 L900 380 L1080 440 L1280 380 L1480 430 L1600 410 L1600 480 L0 480 Z" fill="#0f1a3a"/>
      </g>

      <!-- ===== 水（運河）背景 ===== -->
      <g>
        <path d="M0 1100 L0 700 L260 580 L260 700 L420 760 L420 820 L0 1020 Z" fill="url(#water)"/>
        <path d="M1600 1100 L1600 660 L1380 580 L1320 620 L1280 600 L1180 640 L1180 760 L1340 820 L1600 920 Z" fill="url(#water)"/>
        <!-- 水のさざ波 -->
        <g opacity="0.4">
          <ellipse class="ripple" cx="100" cy="900" rx="20" ry="2" fill="#a3c5f0"/>
          <ellipse class="ripple b" cx="180" cy="950" rx="25" ry="2.5" fill="#a3c5f0"/>
          <ellipse class="ripple" cx="60" cy="800" rx="18" ry="2" fill="#a3c5f0"/>
          <ellipse class="ripple b" cx="1500" cy="900" rx="22" ry="2.4" fill="#a3c5f0"/>
          <ellipse class="ripple" cx="1420" cy="850" rx="18" ry="2" fill="#a3c5f0"/>
          <ellipse class="ripple b" cx="1300" cy="780" rx="20" ry="2.2" fill="#a3c5f0"/>
        </g>
      </g>

      <!-- ===== 大地（メインプラットフォーム） ===== -->
      <g>
        <!-- 大きな多角形の島 -->
        <path d="M260 580 L780 370 L1380 580 L1180 760 L1340 820 L1180 940 L780 1080 L420 940 L420 820 L260 700 Z" fill="url(#ground)" stroke="#1a2342" stroke-width="2"/>
        <!-- 石畳の目地 -->
        <g stroke="rgba(0,0,0,0.18)" stroke-width="1" fill="none">
          <path d="M340 620 L1340 620"/>
          <path d="M340 660 L1380 660"/>
          <path d="M340 700 L1380 700"/>
          <path d="M340 740 L1340 740"/>
          <path d="M340 780 L1300 780"/>
          <path d="M380 820 L1260 820"/>
          <path d="M420 860 L1220 860"/>
          <path d="M460 900 L1180 900"/>
          <path d="M500 940 L1140 940"/>
          <path d="M540 980 L1100 980"/>
          <path d="M600 1020 L1040 1020"/>
          <path d="M660 1050 L980 1050"/>
          <!-- 縦目地 -->
          <path d="M780 380 L780 1080"/>
          <path d="M680 420 L520 980"/>
          <path d="M580 470 L380 940"/>
          <path d="M880 420 L1040 980"/>
          <path d="M980 470 L1180 940"/>
          <path d="M1080 510 L1300 880"/>
        </g>

        <!-- 中央広場のハイライト石畳 -->
        <ellipse cx="780" cy="780" rx="220" ry="110" fill="#5b6789" opacity="0.4"/>
        <ellipse cx="780" cy="780" rx="180" ry="90" fill="#7280a8" opacity="0.3"/>
      </g>

      <!-- ===== 草パッチ（地面の上） ===== -->
      <g opacity="0.85">
        <ellipse cx="320" cy="650" rx="30" ry="10" fill="#3a6244"/>
        <ellipse cx="1280" cy="650" rx="30" ry="10" fill="#3a6244"/>
        <ellipse cx="500" cy="940" rx="35" ry="12" fill="#3a6244"/>
        <ellipse cx="1080" cy="950" rx="35" ry="12" fill="#3a6244"/>
        <ellipse cx="900" cy="1010" rx="40" ry="13" fill="#3a6244"/>
        <ellipse cx="660" cy="1010" rx="35" ry="12" fill="#3a6244"/>
      </g>

      <!-- ===== 石壁・橋 ===== -->
      <g>
        <!-- 左側の石護岸 -->
        <path d="M260 580 L260 700 L420 820 L420 940 L380 940 L380 820 L240 700 L240 580 Z" fill="#5b6789" stroke="#2a3350" stroke-width="1"/>
        <!-- 右側の石護岸 -->
        <path d="M1380 580 L1180 760 L1340 820 L1180 940 L1220 940 L1340 840 L1180 760 L1380 600 Z" fill="#5b6789" stroke="#2a3350" stroke-width="1"/>
      </g>

      <!-- ============================================ -->
      <!-- ==== 建物群（後ろから順に描画） ==== -->
      <!-- ============================================ -->

      <!-- === 奥列：左の家(R1) === -->
      <g class="building" data-key="training" transform="translate(420,520)">
        <ellipse cx="0" cy="100" rx="120" ry="20" fill="#000" opacity="0.4"/>
        <!-- 本体 -->
        <path d="M-80 -20 L0 20 L0 90 L-80 50 Z" fill="url(#wallA)"/>
        <path d="M0 20 L80 -20 L80 50 L0 90 Z" fill="url(#wallB)"/>
        <!-- 木組み（チューダー風） -->
        <path d="M-80 0 L0 40 L0 50 L-80 10 Z" fill="#5a3820" opacity="0.55"/>
        <path d="M0 40 L80 0 L80 10 L0 50 Z" fill="#5a3820" opacity="0.55"/>

<!-- ===== UI ===== -->
<header class="header">
  <div class="brand">
    <div class="dot"></div>

  </div>
  <div class="nav">
    <span>RESEARCH</span>
    <span>BUSINESS</span>
    <span>BENEFIT</span>
    <span>COMPANY</span>
  </div>
  <div class="ver">v3 — COZY NIGHT</div>
</header>

<div class="clock-panel">
  <div class="clock-time" id="clockTime">--:--:--</div>
  <div class="clock-date" id="clockDate">----/--/-- (--)</div>
  <div class="clock-period" id="clockPeriod">— NIGHT —</div>
</div>

<div class="kpi">
  <h4>LIVE KPI</h4>
  <div class="kpi-row"><span class="k">本日の来訪者</span><span class="v" id="kpiVisitors">287</span></div>
  <div class="kpi-row"><span class="k">稼働中AI</span><span class="v" id="kpiAi">14</span></div>
  <div class="kpi-row"><span class="k">月間売上 (万円)</span><span class="v" id="kpiRevenue">18,420</span></div>
  <div class="kpi-row"><span class="k">月間利益 (万円)</span><span class="v" id="kpiProfit">4,280</span></div>
  <div class="kpi-row"><span class="k">在籍社員</span><span class="v" id="kpiEmployees">1,820</span></div>
</div>

<div class="demo">
  <h4>DEMO CONTROLS</h4>
  <div class="demo-row">
    <button id="btnHour">+1時間</button>
    <button id="btnDay">+1日</button>
    <button id="btnWeek">+1週</button>
  </div>
  <div class="demo-row">
    <button id="btnRand" class="primary">KPI更新</button>
    <button id="btnReset">リセット</button>
  </div>
  <div class="hint">建物をクリックすると詳細が開きます</div>
</div>

<div class="hint-bar" id="hintBar">+1時間 進めました</div>

<aside class="detail" id="detail">
  <button class="detail-close" id="detailClose">×</button>
  <div id="detailContent"></div>
</aside>

<script>
  // ===== 星 =====
  (function(){
    const wrap = document.getElementById('stars');
    let html = '';
    for(let i=0;i<100;i++){
      const x = Math.random()*100;
      const y = Math.random()*55;
      const d = (Math.random()*3 + 1).toFixed(1);
      const dl = (Math.random()*3).toFixed(1);
      html += `<span style="left:${x}%;top:${y}%;animation-duration:${d}s;animation-delay:-${dl}s;"></span>`;
    }
    wrap.innerHTML = html;
  })();

  // ===== 状態 =====
  const state = {
    virtualDate: (function(){const d=new Date(); d.setHours(20,30,0,0); return d;})(),
    kpis: { visitors:287, ai:14, revenue:18420, profit:4280, employees:1820 },
  };
  const baseKpi = {...state.kpis};

  const $time = document.getElementById('clockTime');
  const $date = document.getElementById('clockDate');
  const $period = document.getElementById('clockPeriod');
  const wd = ['日','月','火','水','木','金','土'];
  const fmt = n => String(n).padStart(2,'0');

  function updateClock(){
    const d = state.virtualDate;
    $time.textContent = `${fmt(d.getHours())}:${fmt(d.getMinutes())}:${fmt(d.getSeconds())}`;
    $date.textContent = `${d.getFullYear()}/${fmt(d.getMonth()+1)}/${fmt(d.getDate())} (${wd[d.getDay()]})`;
    const h = d.getHours();
    let p = '— NIGHT —';
    if(h>=5 && h<10) p='— MORNING —';
    else if(h>=10 && h<16) p='— DAYTIME —';
    else if(h>=16 && h<19) p='— SUNSET —';
    $period.textContent = p;
    const hourAngle = ((h%12) + d.getMinutes()/60) * 30;
    const minAngle = d.getMinutes() * 6;
    document.getElementById('hourHand').setAttribute('transform', `rotate(${hourAngle})`);
    document.getElementById('minHand').setAttribute('transform', `rotate(${minAngle})`);
    document.getElementById('hourHand2').setAttribute('transform', `rotate(${hourAngle})`);
    document.getElementById('minHand2').setAttribute('transform', `rotate(${minAngle})`);
  }

  function updateKpi(){
    const k = state.kpis;
    document.getElementById('kpiVisitors').textContent = k.visitors.toLocaleString();
    document.getElementById('kpiAi').textContent = k.ai.toLocaleString();
    document.getElementById('kpiRevenue').textContent = k.revenue.toLocaleString();
    document.getElementById('kpiProfit').textContent = k.profit.toLocaleString();
    document.getElementById('kpiEmployees').textContent = k.employees.toLocaleString();
  }

  function jitter(n, pct, integer=false){
    const delta = n * pct * (Math.random()*2 - 1);
    const v = n + delta;
    return integer ? Math.round(v) : Math.round(v*10)/10;
  }
  function randomizeKpi(){
    state.kpis = {
      visitors: Math.max(0, Math.round(jitter(state.kpis.visitors, 0.20, true))),
      ai: Math.max(0, Math.round(jitter(state.kpis.ai, 0.30, true))),
      revenue: Math.round(jitter(state.kpis.revenue, 0.06)),
      profit: Math.round(jitter(state.kpis.profit, 0.08)),
      employees: Math.max(1500, Math.round(jitter(state.kpis.employees, 0.01, true))),
    };
    updateKpi();
  }

  setInterval(()=>{
    state.virtualDate = new Date(state.virtualDate.getTime() + 1000);
    updateClock();
  }, 1000);
  setInterval(()=>{ randomizeKpi(); }, 8000);

  function showHint(t){
    const $h = document.getElementById('hintBar');
    $h.textContent = t;
    $h.classList.add('show');
    clearTimeout(showHint._t);
    showHint._t = setTimeout(()=>$h.classList.remove('show'), 1400);
  }
  document.getElementById('btnHour').onclick = ()=>{
    state.virtualDate = new Date(state.virtualDate.getTime() + 3600*1000);
    updateClock(); showHint('+1時間 進めました');
  };
  document.getElementById('btnDay').onclick = ()=>{
    state.virtualDate = new Date(state.virtualDate.getTime() + 24*3600*1000);
    updateClock(); randomizeKpi(); showHint('+1日 進めました');
  };
  document.getElementById('btnWeek').onclick = ()=>{
    state.virtualDate = new Date(state.virtualDate.getTime() + 7*24*3600*1000);
    updateClock(); randomizeKpi(); showHint('+1週 進めました');
  };
  document.getElementById('btnRand').onclick = ()=>{ randomizeKpi(); showHint('KPIを更新しました'); };
  document.getElementById('btnReset').onclick = ()=>{
    const d = new Date(); d.setHours(20,30,0,0);
    state.virtualDate = d;
    state.kpis = {...baseKpi};
    updateClock(); updateKpi(); showHint('リセットしました');
  };

  const details = {
    training: {
      name:'RESEARCH', tag:'研修・育成棟',
      lead:'最先端のAIと向き合うエンジニアを、ここで育てています。夜でも灯りが消えない学びの拠点です。',
      features:[
        {h:'実機トレーニング',p:'本番環境を模した実機で、365日トレーニングを継続できます。'},
        {h:'メンター常駐',p:'専属メンターが伴走し、新人でも3ヶ月で戦力化できる仕組みを整えています。'},
        {h:'資格支援',p:'クラウド・データサイエンス系資格の取得を全額サポートします。'},
      ]
    },
    business: {
      name:'BUSINESS', tag:'事業推進棟',
      lead:'営業・コンサル・PMが集う、提案と実行の拠点。商談から納品まで一気通貫で動きます。',
      features:[
        {h:'業界横断の実績',p:'金融・小売・製造・公共と多業種にわたる導入実績を保有しています。'},
        {h:'高速プロトタイピング',p:'2週間で動くプロトタイプを提供する独自プロセスを採用しています。'},
        {h:'共創ワークショップ',p:'お客様と一緒に要件を磨くワークショップを毎月開催しています。'},
      ]
    },
    welfare: {
      name:'BENEFIT', tag:'社員福利厚生棟',
      lead:'頑張った社員を、ちゃんと労う場所。カフェ・休憩室・社員食堂を備えています。',
      features:[
        {h:'社内カフェ',p:'バリスタ常駐の本格カフェを社員価格で利用できます。'},
        {h:'リフレッシュ休暇',p:'年に1度、5営業日の連続休暇を全社員に付与しています。'},
        {h:'家族イベント',p:'年2回、家族を招いたイベントを開催しています。'},
      ]
    },
    company: {
      name:'COMPANY', tag:'本社棟',
      lead:'TECH PARTNERSの中枢。経営・人事・広報・経理が、社員と事業を支えています。',
      features:[
        {h:'透明な経営',p:'四半期ごとに全社員へ業績共有を行い、判断の背景まで開示しています。'},
        {h:'柔軟な働き方',p:'フルリモート・フレックス・週休3日 など、多彩な働き方を選べます。'},
        {h:'長期視点の投資',p:'10年先を見据えた研究開発・人材投資を継続しています。'},
      ]
    },
    tower: {
      name:'CLOCK TOWER', tag:'時計台',
      lead:'街の中心に立つシンボル。仮想時間の流れを刻む、ホームページの心臓部です。',
      features:[
        {h:'仮想時計',p:'右上の時刻と完全連動しています。DEMOボタンで時間を進められます。'},
        {h:'時間帯演出',p:'朝・昼・夕・夜の時間帯で街の雰囲気が切り替わります。'},
      ]
    },
  };

  document.querySelectorAll('.building').forEach(el=>{
    el.addEventListener('click', ()=>{
      const k = el.getAttribute('data-key');
      const d = details[k]; if(!d) return;
      const c = document.getElementById('detailContent');
      c.innerHTML = `
        <div class="badge">${d.tag}</div>
        <h2>${d.name}</h2>
        <p>${d.lead}</p>
        ${d.features.map(f=>`<div class="feature"><h3>${f.h}</h3><p>${f.p}</p></div>`).join('')}
      `;
      document.getElementById('detail').classList.add('open');
    });
  });
  document.getElementById('detailClose').onclick = ()=>{
    document.getElementById('detail').classList.remove('open');
  };

  updateClock();
  updateKpi();
</script>
