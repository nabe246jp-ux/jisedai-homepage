<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TECH PARTNERS TOWN v3 — Night</title>
<style>
  :root{
    --sky-top:#0a1130;
    --sky-mid:#162048;
    --sky-bottom:#2a2c5a;
    --ground:#3a4565;
    --ground-dark:#2a3350;
    --stone:#5b6789;
    --stone-light:#7280a8;
    --wall:#f0d9a8;
    --wall-shade:#c9a774;
    --roof:#2c3a6b;
    --roof-light:#3e4f88;
    --roof-dark:#1d2750;
    --window:#ffd478;
    --window-soft:#ffb148;
    --lamp:#ffd982;
    --sakura:#f7b3cc;
    --sakura-deep:#e293b3;
    --grass:#4f8259;
    --grass-deep:#3a6244;
    --water:#6cd5d0;
    --water-deep:#3aa8a4;
    --gold:#f5cf8a;
    --text:#fbe9c4;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:#0a1130;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;color:var(--text);}

  /* ===== 全体背景（夜空） ===== */
  .scene{
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse at 75% 5%, rgba(255,220,160,0.12) 0%, transparent 40%),
      radial-gradient(ellipse at 20% 0%, rgba(120,140,220,0.18) 0%, transparent 50%),
      linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 40%, var(--sky-bottom) 100%);
    overflow:hidden;
  }

  /* 星 */
  .stars{position:absolute; inset:0; pointer-events:none;}
  .stars span{
    position:absolute; width:2px; height:2px; border-radius:50%;
    background:#ffffff; opacity:0.8;
    box-shadow:0 0 4px rgba(255,255,255,0.6);
    animation:twinkle 3s infinite ease-in-out;
  }
  @keyframes twinkle{
    0%,100%{opacity:0.3;}50%{opacity:0.95;}
  }

  /* 月 */
  .moon{
    position:absolute; top:6%; right:10%;
    width:80px;height:80px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #fff8e0 0%, #f5cf8a 60%, #c8a058 100%);
    box-shadow:0 0 60px rgba(245,207,138,0.45), 0 0 120px rgba(245,207,138,0.25);
  }

  /* ===== 街本体（SVG） ===== */
  .town-wrap{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
  }
  svg.town{
    width:min(1400px, 96vw);
    height:auto;
    max-height:88vh;
    filter:drop-shadow(0 20px 40px rgba(0,0,0,0.45));
  }

  /* 窓のちらつき */
  @keyframes flicker{
    0%,100%{opacity:1;}
    48%{opacity:0.92;}
    50%{opacity:0.7;}
    52%{opacity:0.95;}
  }
  .win{animation:flicker 5s infinite ease-in-out;}
  .win.b{animation-duration:7s; animation-delay:-2s;}
  .win.c{animation-duration:6s; animation-delay:-4s;}

  /* 街灯のグロー */
  @keyframes lampPulse{
    0%,100%{opacity:0.85;}
    50%{opacity:1;}
  }
  .lamp-glow{animation:lampPulse 4s infinite ease-in-out; transform-origin:center;}

  /* 噴水の水 */
  @keyframes waterShimmer{
    0%,100%{transform:translateY(0) scaleX(1);}
    50%{transform:translateY(-1px) scaleX(0.96);}
  }
  .water-top{animation:waterShimmer 2.4s infinite ease-in-out; transform-origin:center;}

  /* 桜の揺れ */
  @keyframes sway{
    0%,100%{transform:rotate(-1.5deg);}
    50%{transform:rotate(1.5deg);}
  }
  .sakura-top{animation:sway 5s infinite ease-in-out; transform-origin:center bottom;}

  /* 建物のホバー */
  .building{cursor:pointer; transition:transform 0.25s ease, filter 0.25s ease;}
  .building:hover{transform:translateY(-3px); filter:brightness(1.18) drop-shadow(0 0 14px rgba(255,212,120,0.5));}

  /* キャラクター（小さい点） */
  @keyframes walk{
    0%{transform:translate(0,0);}
    25%{transform:translate(8px,-4px);}
    50%{transform:translate(16px,0);}
    75%{transform:translate(8px,4px);}
    100%{transform:translate(0,0);}
  }
  .npc{animation:walk 6s infinite linear;}
  .npc.b{animation-duration:8s; animation-delay:-2s;}
  .npc.c{animation-duration:7s; animation-delay:-4s;}

  /* ===== UI レイヤ ===== */
  .header{
    position:fixed; top:0; left:0; right:0;
    padding:18px 28px;
    display:flex; align-items:center; justify-content:space-between;
    z-index:30; pointer-events:none;
  }
  .brand{display:flex; align-items:center; gap:10px; pointer-events:auto;}
  .brand .dot{width:8px; height:8px; border-radius:50%; background:var(--lamp); box-shadow:0 0 10px var(--lamp);}
  .brand-name{font-size:13px; letter-spacing:0.4em; color:var(--gold); font-weight:700;}
  .nav{display:flex; gap:22px; font-size:11px; letter-spacing:0.3em; color:rgba(251,233,196,0.6); pointer-events:auto;}
  .ver{font-size:10px; letter-spacing:0.3em; color:rgba(251,233,196,0.45); pointer-events:auto;}

  /* 時計 */
  .clock-panel{
    position:fixed; top:64px; right:24px; z-index:30;
    background:rgba(20,28,55,0.78);
    backdrop-filter:blur(12px);
    border:1px solid rgba(245,207,138,0.25);
    border-radius:14px;
    padding:14px 18px;
    text-align:right;
    color:var(--text);
    box-shadow:0 8px 28px rgba(0,0,0,0.4);
    min-width:180px;
  }
  .clock-time{font-size:26px; font-weight:700; letter-spacing:0.08em; color:var(--gold); font-variant-numeric:tabular-nums;}
  .clock-date{font-size:11px; letter-spacing:0.2em; color:rgba(251,233,196,0.7); margin-top:4px;}
  .clock-period{font-size:10px; letter-spacing:0.3em; color:rgba(245,207,138,0.85); margin-top:6px;}

  /* DEMO CONTROLS */
  .demo{
    position:fixed; bottom:18px; left:18px; z-index:30;
    background:rgba(20,28,55,0.78);
    backdrop-filter:blur(12px);
    border:1px solid rgba(245,207,138,0.25);
    border-radius:14px;
    padding:14px 16px;
    box-shadow:0 8px 28px rgba(0,0,0,0.4);
    min-width:240px;
  }
  .demo h4{
    font-size:10px; letter-spacing:0.35em; color:var(--gold);
    margin-bottom:10px; font-weight:700;
  }
  .demo-row{display:flex; gap:6px; margin-bottom:6px; flex-wrap:wrap;}
  .demo button{
    flex:1; min-width:64px;
    padding:8px 10px; border-radius:8px;
    background:rgba(245,207,138,0.12);
    color:var(--text);
    border:1px solid rgba(245,207,138,0.3);
    font-size:11px; letter-spacing:0.05em;
    cursor:pointer; transition:all 0.18s;
  }
  .demo button:hover{background:rgba(245,207,138,0.25); transform:translateY(-1px);}
  .demo button.primary{background:rgba(255,180,80,0.25); border-color:rgba(255,180,80,0.55);}
  .demo .hint{font-size:10px; color:rgba(251,233,196,0.5); margin-top:6px; letter-spacing:0.05em;}

  /* KPI */
  .kpi{
    position:fixed; bottom:18px; right:18px; z-index:30;
    background:rgba(20,28,55,0.78);
    backdrop-filter:blur(12px);
    border:1px solid rgba(245,207,138,0.25);
    border-radius:14px;
    padding:14px 18px;
    box-shadow:0 8px 28px rgba(0,0,0,0.4);
    min-width:280px;
  }
  .kpi h4{
    font-size:10px; letter-spacing:0.35em; color:var(--gold);
    margin-bottom:10px; font-weight:700;
  }
  .kpi-row{display:flex; justify-content:space-between; padding:5px 0; font-size:12px;}
  .kpi-row .k{color:rgba(251,233,196,0.65);}
  .kpi-row .v{color:var(--gold); font-weight:700; font-variant-numeric:tabular-nums;}

  /* 建物詳細パネル */
  .detail{
    position:fixed; top:0; right:-460px; bottom:0;
    width:440px; max-width:92vw;
    background:rgba(14,20,42,0.95);
    backdrop-filter:blur(16px);
    border-left:1px solid rgba(245,207,138,0.28);
    z-index:50;
    transition:right 0.4s cubic-bezier(0.5,0,0.2,1);
    padding:60px 32px 30px;
    overflow-y:auto;
    color:var(--text);
  }
  .detail.open{right:0;}
  .detail-close{
    position:absolute; top:16px; right:16px;
    width:36px; height:36px; border-radius:50%;
    background:rgba(245,207,138,0.15);
    border:1px solid rgba(245,207,138,0.3);
    color:var(--gold);
    font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .detail h2{
    font-size:24px; color:var(--gold); margin-bottom:6px; font-weight:700; letter-spacing:0.08em;
  }
  .detail .badge{
    display:inline-block; padding:4px 12px;
    background:rgba(245,207,138,0.18);
    border:1px solid rgba(245,207,138,0.35);
    border-radius:99px;
    font-size:10px; letter-spacing:0.3em; color:var(--gold);
    margin-bottom:18px;
  }
  .detail p{font-size:13px; line-height:1.85; color:rgba(251,233,196,0.85); margin-bottom:14px;}
  .detail .feature{
    background:rgba(245,207,138,0.06);
    border:1px solid rgba(245,207,138,0.18);
    border-radius:10px;
    padding:14px 16px; margin-bottom:10px;
  }
  .detail .feature h3{font-size:13px; color:var(--gold); margin-bottom:6px; letter-spacing:0.05em;}
  .detail .feature p{font-size:12px; line-height:1.7; margin:0; color:rgba(251,233,196,0.75);}

  /* ヒント */
  .hint-bar{
    position:fixed; top:50%; left:50%;
    transform:translate(-50%,-50%);
    background:rgba(14,20,42,0.86);
    border:1px solid rgba(245,207,138,0.3);
    border-radius:99px;
    padding:8px 18px;
    font-size:12px; color:var(--gold);
    letter-spacing:0.1em;
    z-index:40;
    opacity:0;
    transition:opacity 0.5s;
    pointer-events:none;
  }
  .hint-bar.show{opacity:1;}

  /* ヴィネット */
  .vignette{
    position:fixed; inset:0; pointer-events:none;
    background:radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.55) 100%);
    z-index:5;
  }

  @media(max-width:720px){
    .clock-panel{top:56px; right:8px; padding:10px 12px; min-width:auto;}
    .clock-time{font-size:20px;}
    .demo{left:8px; right:8px; bottom:8px; min-width:auto;}
    .kpi{display:none;}
    .nav{display:none;}
  }
</style>
</head>
<body>

<div class="scene">
  <div class="stars" id="stars"></div>
  <div class="moon"></div>

  <div class="town-wrap">
    <!-- ===== 街SVG ===== -->
    <svg class="town" viewBox="-700 -100 1400 800" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- グラデーション定義 -->
        <linearGradient id="grdWall" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#f0d9a8"/>
          <stop offset="1" stop-color="#cda878"/>
        </linearGradient>
        <linearGradient id="grdWallShade" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#c9a774"/>
          <stop offset="1" stop-color="#9a7d50"/>
        </linearGradient>
        <linearGradient id="grdRoof" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#3e4f88"/>
          <stop offset="1" stop-color="#1f2a4a"/>
        </linearGradient>
        <linearGradient id="grdRoofDark" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#2c3a6b"/>
          <stop offset="1" stop-color="#161e3c"/>
        </linearGradient>
        <linearGradient id="grdGround" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#4a5478"/>
          <stop offset="1" stop-color="#2a3350"/>
        </linearGradient>

        <!-- 街灯のハロー -->
        <radialGradient id="lampHalo">
          <stop offset="0" stop-color="#ffd982" stop-opacity="0.9"/>
          <stop offset="0.4" stop-color="#ffd982" stop-opacity="0.35"/>
          <stop offset="1" stop-color="#ffd982" stop-opacity="0"/>
        </radialGradient>

        <!-- 窓グロー -->
        <radialGradient id="winGlow">
          <stop offset="0" stop-color="#fff0c0" stop-opacity="1"/>
          <stop offset="1" stop-color="#ffb148" stop-opacity="1"/>
        </radialGradient>

        <!-- 噴水ハロー -->
        <radialGradient id="fountainHalo">
          <stop offset="0" stop-color="#a3f0ed" stop-opacity="0.7"/>
          <stop offset="1" stop-color="#a3f0ed" stop-opacity="0"/>
        </radialGradient>

        <!-- ぼかしフィルタ -->
        <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="6" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>

        <!-- 桜のシンボル -->
        <symbol id="sakura" viewBox="-30 -60 60 70">
          <!-- 幹 -->
          <rect x="-3" y="-10" width="6" height="14" fill="#3a2a1a"/>
          <!-- 葉 -->
          <g class="sakura-top">
            <circle cx="-8" cy="-30" r="14" fill="#f7b3cc"/>
            <circle cx="10" cy="-32" r="16" fill="#f7b3cc"/>
            <circle cx="0" cy="-42" r="14" fill="#f7b3cc"/>
            <circle cx="-12" cy="-22" r="11" fill="#e293b3"/>
            <circle cx="12" cy="-22" r="11" fill="#e293b3"/>
            <circle cx="0" cy="-30" r="13" fill="#ffc7da"/>
          </g>
        </symbol>

        <!-- 街灯のシンボル -->
        <symbol id="lamp" viewBox="-15 -55 30 60">
          <!-- 支柱 -->
          <rect x="-1.5" y="-40" width="3" height="42" fill="#1a1a28"/>
          <!-- 笠 -->
          <path d="M-9 -42 L9 -42 L7 -48 L-7 -48 Z" fill="#1a1a28"/>
          <!-- 光源 -->
          <circle cx="0" cy="-44" r="4" fill="#ffd982"/>
          <!-- ハロー -->
          <circle class="lamp-glow" cx="0" cy="-44" r="22" fill="url(#lampHalo)"/>
        </symbol>

        <!-- 小さな茂み -->
        <symbol id="bush" viewBox="-20 -20 40 30">
          <ellipse cx="-6" cy="0" rx="9" ry="6" fill="#3a6244"/>
          <ellipse cx="6" cy="0" rx="9" ry="6" fill="#3a6244"/>
          <ellipse cx="0" cy="-4" rx="10" ry="7" fill="#4f8259"/>
        </symbol>
      </defs>

      <!-- ===== 背景（遠景の山） ===== -->
      <g opacity="0.45">
        <path d="M-700 240 L-500 120 L-380 200 L-200 100 L-50 220 L120 130 L300 240 L500 150 L700 240 L700 350 L-700 350 Z" fill="#1a234a"/>
        <path d="M-700 280 L-450 200 L-280 280 L-100 220 L80 300 L260 230 L440 290 L700 240 L700 350 L-700 350 Z" fill="#0f1a3a"/>
      </g>

      <!-- ===== 地面（アイソメトリックの石畳プラットフォーム） ===== -->
      <g id="ground">
        <!-- 大きな菱形の地面 -->
        <path d="M0 200 L640 400 L0 600 L-640 400 Z" fill="url(#grdGround)" stroke="#1a2342" stroke-width="2"/>

        <!-- 石畳のタイル目地 -->
        <g stroke="rgba(0,0,0,0.18)" stroke-width="1" fill="none">
          <!-- 縦方向 -->
          <path d="M-560 425 L-80 665"/>
          <path d="M-480 450 L80 730"/>
          <path d="M-400 475 L240 795"/>
          <path d="M-320 500 L400 860"/>
          <path d="M-160 425 L320 665"/>
          <path d="M-80 400 L400 640"/>
          <path d="M0 375 L480 615"/>
          <path d="M80 350 L560 590"/>
          <path d="M240 425 L560 585"/>
          <path d="M320 450 L560 570"/>
          <!-- 横方向 -->
          <path d="M560 430 L-560 430"/>
          <path d="M480 455 L-480 455"/>
          <path d="M400 480 L-400 480"/>
          <path d="M320 505 L-320 505"/>
          <path d="M240 530 L-240 530"/>
          <path d="M160 555 L-160 555"/>
          <path d="M80 580 L-80 580"/>
        </g>

        <!-- 道（中央十字の明るい石畳） -->
        <path d="M0 275 L160 355 L0 435 L-160 355 Z" fill="#5b6789" opacity="0.55"/>
        <path d="M-160 355 L0 435 L-320 595 L-480 515 Z" fill="#5b6789" opacity="0.55"/>
        <path d="M160 355 L0 435 L320 595 L480 515 Z" fill="#5b6789" opacity="0.55"/>
      </g>

      <!-- ===== 建物（後ろから順に配置） ===== -->

      <!-- ===== TRAINING（左奥） — 桜と研修棟 ===== -->
      <g class="building" data-key="training" transform="translate(-380,180)">
        <!-- 影 -->
        <ellipse cx="0" cy="80" rx="120" ry="22" fill="#000" opacity="0.35"/>
        <!-- 建物本体（アイソメトリック直方体） -->
        <!-- 右壁（影側） -->
        <path d="M0 -20 L100 30 L100 80 L0 30 Z" fill="url(#grdWallShade)"/>
        <!-- 左壁（明側） -->
        <path d="M0 -20 L-100 30 L-100 80 L0 30 Z" fill="url(#grdWall)"/>
        <!-- 屋根（菱形） -->
        <path d="M0 -100 L120 -40 L0 20 L-120 -40 Z" fill="url(#grdRoof)" stroke="#0e1530" stroke-width="1.5"/>
        <!-- 屋根のハイライト -->
        <path d="M0 -100 L60 -70 L0 -40 L-60 -70 Z" fill="#4d63a8" opacity="0.4"/>
        <!-- 煙突 -->
        <rect x="40" y="-80" width="14" height="22" fill="#7a6248"/>
        <rect x="40" y="-80" width="14" height="6" fill="#5a4830"/>

        <!-- 窓 (右壁) -->
        <g>
          <path class="win" d="M30 0 L46 8 L46 22 L30 14 Z" fill="url(#winGlow)"/>
          <path class="win b" d="M62 16 L78 24 L78 38 L62 30 Z" fill="url(#winGlow)"/>
        </g>
        <!-- 窓 (左壁) -->
        <g>
          <path class="win c" d="M-30 0 L-46 8 L-46 22 L-30 14 Z" fill="url(#winGlow)"/>
          <path class="win" d="M-62 16 L-78 24 L-78 38 L-62 30 Z" fill="url(#winGlow)"/>
        </g>
        <!-- 入口 -->
        <path d="M-12 30 L12 42 L12 70 L-12 58 Z" fill="#3a2a1a"/>
        <path d="M-8 36 L8 44 L8 64 L-8 56 Z" fill="url(#winGlow)" opacity="0.65"/>
        <!-- 看板 -->
        <rect x="-46" y="-32" width="92" height="14" fill="#2a1a10" rx="2"/>
        <text x="0" y="-22" text-anchor="middle" font-size="10" fill="#f5cf8a" font-weight="700" letter-spacing="2">RESEARCH</text>

        <!-- 桜の木 -->
        <g transform="translate(-130,40)"><use href="#sakura"/></g>
        <g transform="translate(125,55) scale(0.85)"><use href="#sakura"/></g>
      </g>

      <!-- ===== BUSINESS（右奥） ===== -->
      <g class="building" data-key="business" transform="translate(360,200)">
        <ellipse cx="0" cy="80" rx="130" ry="24" fill="#000" opacity="0.35"/>
        <!-- 本体 -->
        <path d="M0 -20 L110 35 L110 90 L0 35 Z" fill="url(#grdWallShade)"/>
        <path d="M0 -20 L-110 35 L-110 90 L0 35 Z" fill="url(#grdWall)"/>
        <!-- 屋根（少し違う色） -->
        <path d="M0 -110 L130 -40 L0 30 L-130 -40 Z" fill="url(#grdRoofDark)" stroke="#0e1530" stroke-width="1.5"/>
        <path d="M0 -110 L60 -75 L0 -40 L-60 -75 Z" fill="#3e4f88" opacity="0.4"/>

        <!-- アーケード（ストライプ天蓋） -->
        <g transform="translate(0,30)">
          <path d="M-70 0 L70 0 L80 12 L-80 12 Z" fill="#c84050"/>
          <path d="M-70 0 L-50 0 L-58 12 L-80 12 Z" fill="#f5e8d0"/>
          <path d="M-30 0 L-10 0 L-12 12 L-34 12 Z" fill="#f5e8d0"/>
          <path d="M10 0 L30 0 L32 12 L8 12 Z" fill="#f5e8d0"/>
          <path d="M50 0 L70 0 L80 12 L52 12 Z" fill="#f5e8d0"/>
        </g>

        <!-- 窓 -->
        <g>
          <path class="win" d="M30 -5 L48 4 L48 18 L30 9 Z" fill="url(#winGlow)"/>
          <path class="win b" d="M64 12 L82 21 L82 35 L64 26 Z" fill="url(#winGlow)"/>
          <path class="win c" d="M-30 -5 L-48 4 L-48 18 L-30 9 Z" fill="url(#winGlow)"/>
          <path class="win" d="M-64 12 L-82 21 L-82 35 L-64 26 Z" fill="url(#winGlow)"/>
        </g>
        <!-- 入口 -->
        <path d="M-14 50 L14 64 L14 88 L-14 74 Z" fill="#3a2a1a"/>
        <path d="M-9 56 L9 65 L9 84 L-9 75 Z" fill="url(#winGlow)" opacity="0.7"/>
        <!-- 看板 -->
        <rect x="-50" y="-36" width="100" height="14" fill="#2a1a10" rx="2"/>
        <text x="0" y="-26" text-anchor="middle" font-size="10" fill="#f5cf8a" font-weight="700" letter-spacing="2">BUSINESS</text>
      </g>

      <!-- ===== WELFARE（左手前 — カフェ風） ===== -->
      <g class="building" data-key="welfare" transform="translate(-330,420)">
        <ellipse cx="0" cy="80" rx="130" ry="24" fill="#000" opacity="0.35"/>
        <path d="M0 -20 L120 40 L120 90 L0 30 Z" fill="url(#grdWallShade)"/>
        <path d="M0 -20 L-120 40 L-120 90 L0 30 Z" fill="url(#grdWall)"/>
        <!-- 赤茶屋根 -->

<script>
  // ===== 星を生成 =====
  (function genStars(){
    const wrap = document.getElementById('stars');
    const n = 80;
    let html = '';
    for(let i=0;i<n;i++){
      const x = Math.random()*100;
      const y = Math.random()*55;
      const d = (Math.random()*3 + 1).toFixed(1);
      const dl = (Math.random()*3).toFixed(1);
      html += `<span style="left:${x}%;top:${y}%;animation-duration:${d}s;animation-delay:-${dl}s;"></span>`;
    }
    wrap.innerHTML = html;
  })();

  // ===== 状態 =====
  const state = {
    virtualDate: (function(){const d=new Date(); d.setHours(20,30,0,0); return d;})(),
    kpis: { visitors:287, ai:14, revenue:18420, profit:4280, employees:1820 },
  };
  const baseKpi = {...state.kpis};

  // ===== UI更新 =====
  const $time = document.getElementById('clockTime');
  const $date = document.getElementById('clockDate');
  const $period = document.getElementById('clockPeriod');
  const wd = ['日','月','火','水','木','金','土'];

  function fmt(n){return String(n).padStart(2,'0');}

  function updateClock(){
    const d = state.virtualDate;
    $time.textContent = `${fmt(d.getHours())}:${fmt(d.getMinutes())}:${fmt(d.getSeconds())}`;
    $date.textContent = `${d.getFullYear()}/${fmt(d.getMonth()+1)}/${fmt(d.getDate())} (${wd[d.getDay()]})`;
    const h = d.getHours();
    let p = '— NIGHT —';
    if(h>=5 && h<10) p='— MORNING —';
    else if(h>=10 && h<16) p='— DAYTIME —';
    else if(h>=16 && h<19) p='— SUNSET —';
    else if(h>=19 || h<5) p='— NIGHT —';
    $period.textContent = p;

    // 時計台の針
    const hourAngle = ((h%12) + d.getMinutes()/60) * 30;
    const minAngle = d.getMinutes() * 6;
    document.getElementById('hourHand').setAttribute('transform', `rotate(${hourAngle})`);
    document.getElementById('minHand').setAttribute('transform', `rotate(${minAngle})`);
    document.getElementById('hourHand2').setAttribute('transform', `rotate(${hourAngle})`);
    document.getElementById('minHand2').setAttribute('transform', `rotate(${minAngle})`);
  }

  function updateKpi(){
    const k = state.kpis;
    document.getElementById('kpiVisitors').textContent = k.visitors.toLocaleString();
    document.getElementById('kpiAi').textContent = k.ai.toLocaleString();
    document.getElementById('kpiRevenue').textContent = k.revenue.toLocaleString();
    document.getElementById('kpiProfit').textContent = k.profit.toLocaleString();
    document.getElementById('kpiEmployees').textContent = k.employees.toLocaleString();
  }

  function jitter(n, pct, integer=false){
    const delta = n * pct * (Math.random()*2 - 1);
    const v = n + delta;
    return integer ? Math.round(v) : Math.round(v*10)/10;
  }
  function randomizeKpi(){
    state.kpis = {
      visitors: Math.max(0, Math.round(jitter(state.kpis.visitors, 0.20, true))),
      ai: Math.max(0, Math.round(jitter(state.kpis.ai, 0.30, true))),
      revenue: Math.round(jitter(state.kpis.revenue, 0.06)),
      profit: Math.round(jitter(state.kpis.profit, 0.08)),
      employees: Math.max(1500, Math.round(jitter(state.kpis.employees, 0.01, true))),
    };
    updateKpi();
  }

  // ===== 自動進行（仮想時計） =====
  setInterval(()=>{
    state.virtualDate = new Date(state.virtualDate.getTime() + 1000);
    updateClock();
  }, 1000);

  // KPI 自動微変動
  setInterval(()=>{ randomizeKpi(); }, 8000);

  // ===== ボタン =====
  function showHint(t){
    const $h = document.getElementById('hintBar');
    $h.textContent = t;
    $h.classList.add('show');
    clearTimeout(showHint._t);
    showHint._t = setTimeout(()=>$h.classList.remove('show'), 1400);
  }
  document.getElementById('btnHour').onclick = ()=>{
    state.virtualDate = new Date(state.virtualDate.getTime() + 3600*1000);
    updateClock(); showHint('+1時間 進めました');
  };
  document.getElementById('btnDay').onclick = ()=>{
    state.virtualDate = new Date(state.virtualDate.getTime() + 24*3600*1000);
    updateClock(); randomizeKpi(); showHint('+1日 進めました');
  };
  document.getElementById('btnWeek').onclick = ()=>{
    state.virtualDate = new Date(state.virtualDate.getTime() + 7*24*3600*1000);
    updateClock(); randomizeKpi(); showHint('+1週 進めました');
  };
  document.getElementById('btnRand').onclick = ()=>{
    randomizeKpi(); showHint('KPIを更新しました');
  };
  document.getElementById('btnReset').onclick = ()=>{
    const d = new Date(); d.setHours(20,30,0,0);
    state.virtualDate = d;
    state.kpis = {...baseKpi};
    updateClock(); updateKpi(); showHint('リセットしました');
  };

  // ===== 建物クリック → 詳細 =====
  const details = {
    training: {
      name:'RESEARCH', tag:'研修・育成棟',
      lead:'最先端のAIと向き合うエンジニアを、ここで育てています。夜でも灯りが消えない、学びの拠点です。',
      features:[
        {h:'実機トレーニング',p:'本番環境を模した実機で、365日トレーニングを継続できます。'},
        {h:'メンター常駐',p:'専属メンターが伴走し、新人でも3ヶ月で戦力化できる仕組みを整えています。'},
        {h:'資格支援',p:'クラウド資格・データサイエンス系資格の取得を全額サポートします。'},
      ]
    },
    business: {
      name:'BUSINESS', tag:'事業推進棟',
      lead:'営業・コンサル・PMが集う、提案と実行の拠点。商談から納品まで一気通貫で動きます。',
      features:[
        {h:'業界横断の実績',p:'金融・小売・製造・公共と、多業種にわたる導入実績を保有しています。'},
        {h:'高速プロトタイピング',p:'2週間で動くプロトタイプを提供する独自プロセスを採用しています。'},
        {h:'共創ワークショップ',p:'お客様と一緒に要件を磨くワークショップを毎月開催しています。'},
      ]
    },
    welfare: {
      name:'BENEFIT', tag:'社員福利厚生棟',
      lead:'頑張った社員を、ちゃんと労う場所。カフェ・休憩室・社員食堂を備えています。',
      features:[
        {h:'社内カフェ',p:'バリスタ常駐の本格カフェを社員価格で利用できます。'},
        {h:'リフレッシュ休暇',p:'年に1度、5営業日の連続休暇を全社員に付与しています。'},
        {h:'家族イベント',p:'年2回、家族を招いたイベントを開催しています。'},
      ]
    },
    company: {
      name:'COMPANY', tag:'本社棟',
      lead:'TECH PARTNERSの中枢。経営・人事・広報・経理が、社員と事業を支えています。',
      features:[
        {h:'透明な経営',p:'四半期ごとに全社員へ業績共有を行い、判断の背景まで開示しています。'},
        {h:'柔軟な働き方',p:'フルリモート・フレックス・週休3日 など、多彩な働き方を選べます。'},
        {h:'長期視点の投資',p:'10年先を見据えた研究開発・人材投資を継続しています。'},
      ]
    },
    tower: {
      name:'CLOCK TOWER', tag:'時計台',
      lead:'街の中心に立つシンボル。仮想時間の流れを刻む、ホームページの心臓部です。',
      features:[
        {h:'仮想時計',p:'ページ右上に表示される時刻と完全連動しています。DEMOボタンで時間を進められます。'},
        {h:'時間帯演出',p:'朝・昼・夕・夜の時間帯で、街の雰囲気が切り替わる予定です。'},
      ]
    },
  };

  document.querySelectorAll('.building').forEach(el=>{
    el.addEventListener('click', ()=>{
      const k = el.getAttribute('data-key');
      const d = details[k]; if(!d) return;
      const c = document.getElementById('detailContent');
      c.innerHTML = `
        <div class="badge">${d.tag}</div>
        <h2>${d.name}</h2>
        <p>${d.lead}</p>
        ${d.features.map(f=>`<div class="feature"><h3>${f.h}</h3><p>${f.p}</p></div>`).join('')}
      `;
      document.getElementById('detail').classList.add('open');
    });
  });
  document.getElementById('detailClose').onclick = ()=>{
    document.getElementById('detail').classList.remove('open');
  };

  // 初期描画
  updateClock();
  updateKpi();
</script>

</body>
</html>
